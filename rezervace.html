<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rezervace | pojdtrenovat.cz</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  font-family:Roboto;
  margin:0;
  background:#f4f6f8;
}

header{
  background:black;
  color:white;
  padding:15px;
  text-align:center;
}

.container{
  max-width:900px;
  margin:20px auto;
  padding:10px;
}

.card{
  background:white;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  border-left:4px solid #e00000;
}

input,button{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
}

button{
  background:black;
  color:white;
  border:none;
  cursor:pointer;
}

.full{
  color:#e00000;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
  <h1>Rezervace tréninků</h1>
</header>

<div class="container" id="list">Načítám...</div>

<script>

const supabaseClient = supabase.createClient(
  "https://kgmdyhiwkkviswluuwkg.supabase.co",
  "sb_publishable_kfn3T6iQ94DE9KLhH82jvw_zEJF-CqI"
);

// ---------------- LOAD ----------------
async function load(){

  const { data: treninky, error } = await supabaseClient
    .from("treninky")
    .select("*")
    .order("datum");

  const container = document.getElementById("list");
  container.innerHTML = "";

  if(error){
    container.innerHTML = "Chyba načítání";
    return;
  }

  treninky.forEach(t => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h2>${t.nazev}</h2>
      <p>${t.datum} | ${t.cas_od} - ${t.cas_do}</p>
      <p>Místo: ${t.misto || "-"}</p>
      <p>Cena: ${t.cena || "-"} Kč</p>

      <input id="hrac-${t.id}" placeholder="Jméno hráče">
      <input id="vek-${t.id}" placeholder="Věk hráče">
      <input id="email-${t.id}" placeholder="Email rodiče">

      <button onclick="reserve('${t.id}')">Rezervovat</button>
    `;

    container.appendChild(div);
  });
}

// ---------------- RESERVE ----------------
async function reserve(id){

  const hrac = document.getElementById("hrac-" + id).value;
  const vek = document.getElementById("vek-" + id).value;
  const email = document.getElementById("email-" + id).value;

  if(!hrac || !vek || !email){
    alert("Vyplň všechny údaje");
    return;
  }

  // 🔍 DUPLICITA (hráč + trénink)
  const { data: existing } = await supabaseClient
    .from("rezervace")
    .select("*")
    .eq("trening_id", id)
    .eq("hrac", hrac)
    .maybeSingle();

  if(existing){
    alert("⚠️ Tento hráč už je na tréninku přihlášený");
    return;
  }

  // 📊 KAPACITA
  const { count } = await supabaseClient
    .from("rezervace")
    .select("*", { count:"exact", head:true })
    .eq("trening_id", id);

  const { data: trening } = await supabaseClient
    .from("treninky")
    .select("kapacita")
    .eq("id", id)
    .single();

  if(count >= trening.kapacita){
    alert("Trénink je plný");
    return;
  }

  // 💾 INSERT
  const { error } = await supabaseClient
    .from("rezervace")
    .insert([{
      trening_id: id,
      hrac: hrac,
      vek: vek,
      email: email
    }]);

  if(error){
    console.log(error);
    alert("Chyba rezervace");
    return;
  }

  alert("Rezervace hotová 💪");
  load();
}

load();

</script>

</body>
</html>
