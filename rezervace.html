  <style>
    body { font-family: Arial; background:#f4f6f8; padding:20px; }
    .card { background:white; padding:15px; margin:10px 0; border-radius:8px; }
  </style>
</head>

<h1>Tréninky</h1>
<div id="list">Načítám...</div>

<script>
const supabaseClient = supabase.createClient(
  "https://kgmdyhiwkkviswluuwkg.supabase.co",
  "sb_publishable_kfn3T6iQ94DE9KLhH82jvw_zEJF-CqI"
);

async function load() {
  console.log("LOAD START");

  const { data, error } = await supabaseClient
    .from("treninky")
    .select("*");

  console.log("DATA:", data);
  console.log("ERROR:", error);

  const container = document.getElementById("list");

  if (error) {
    container.innerHTML = "CHYBA: " + error.message;
    return;
  }

  if (!data) {
    container.innerHTML = "Žádná data";
    return;
  }

  container.innerHTML = "";

  data.forEach(t => {
    container.innerHTML += `
      <div class="card">
        <h2>${t.nazev}</h2>
        <p>${t.datum} ${t.cas_od} - ${t.cas_do}</p>
        <p>Kapacita: ${t.kapacita}</p>
      </div>
    `;
  });
}

load();
}
</script>
