<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rezervace | pojdtrenovat.cz</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  font-family:Roboto;
  margin:0;
  background:#f4f6f8;
  color:#111;
}

/* HEADER */
.header{
  background:#000;
  color:#fff;
  padding:10px 15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.nav a{
  color:#fff;
  margin:0 8px;
  text-decoration:none;
}

.container{
  max-width:900px;
  margin:20px auto;
  padding:10px;
}

/* WEEK BAR */
.app-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  background:#000;
  color:#fff;
  border-radius:12px;
  margin-bottom:10px;
}

.app-header button{
  background:#fff;
  color:#000;
  border:none;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  width:44px;
  height:44px;
}

/* LIST */
.app-list{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.app-card{
  background:#fff;
  padding:14px;
  border-radius:14px;
  box-shadow:0 4px 14px rgba(0,0,0,0.08);
  cursor:pointer;
}

/* CAPACITY */
.green{border-left:4px solid #2ecc71;}
.yellow{border-left:4px solid #f1c40f;}
.red{border-left:4px solid #e74c3c;}

/* DETAIL */
.bottom-sheet{
  background:#fff;
  padding:16px;
  border-radius:16px;
  box-shadow:0 4px 20px rgba(0,0,0,0.15);
}

/* INPUTS */
input,button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:14px;
}

button{
  background:#111;
  color:#fff;
  cursor:pointer;
}

button:hover{
  background:#e60000;
}
</style>
</head>

<body>

<header class="header">
  <h1>pojdtrenovat.cz</h1>
  <nav class="nav">
    <a href="index.html">Úvod</a>
    <a href="treneri.html">Trenéři</a>
    <a href="rezervace.html">Rezervace</a>
  </nav>
</header>

<div class="container">
  <h2>Tréninky</h2>
  <div id="app">Načítám...</div>
</div>

<script>

const supabaseClient = supabase.createClient(
  "https://kgmdyhiwkkviswluuwkg.supabase.co",
  "sb_publishable_kfn3T6iQ94DE9KLhH82jvw_zEJF-CqI"
);

let allData = [];
let reservationCounts = {};
let days = [];
let selectedDay = 0;
let selectedTraining = null;

// ================= LOAD =================
async function load(){

  const { data: treninky } = await supabaseClient
    .from("treninky")
    .select("*");

  const { data: rezervace } = await supabaseClient
    .from("rezervace")
    .select("trening_id");

  reservationCounts = {};
  (rezervace || []).forEach(r=>{
    reservationCounts[r.trening_id] =
      (reservationCounts[r.trening_id] || 0) + 1;
  });

  allData = treninky || [];

  const unique = [...new Set(allData.map(t=>t.datum))];

  // FIX správné řazení datumů
  days = unique.sort((a,b)=> new Date(a) - new Date(b));

  renderDay();
}

// ================= RENDER DAY =================
function renderDay(){

  const date = days[selectedDay];

  const trainings = allData.filter(t => t.datum === date);

  let html = `
    <div class="app-header">
      <button onclick="changeDay(-1)">←</button>
      <div>${formatDate(date)}</div>
      <button onclick="changeDay(1)">→</button>
    </div>

    <div class="app-list">
  `;

  trainings.forEach(t=>{

    const count = reservationCounts[t.id] || 0;
    const free = t.kapacita - count;

    let color = "green";
    if(free === 0) color = "red";
    else if(free <= 2) color = "yellow";

    html += `
      <div class="app-card ${color}" onclick="openTraining('${t.id}')">
        <h3>${t.nazev}</h3>
        <p>${t.cas_od} - ${t.cas_do}</p>
        <p>${count}/${t.kapacita}</p>
      </div>
    `;
  });

  html += `</div>`;

  document.getElementById("app").innerHTML = html;
}

// ================= DAY =================
function changeDay(dir){

  selectedDay += dir;

  if(selectedDay < 0) selectedDay = 0;
  if(selectedDay >= days.length) selectedDay = days.length - 1;

  renderDay();
}

// ================= DETAIL =================
function openTraining(id){

  selectedTraining = allData.find(t=>t.id===id);

  const t = selectedTraining;

  document.getElementById("app").innerHTML = `
    <div class="bottom-sheet">

      <h2>${t.nazev}</h2>

      <p>📅 ${t.datum}</p>
      <p>⏰ ${t.cas_od} - ${t.cas_do}</p>
      <p>📍 ${t.misto || "-"}</p>
      <p>💰 ${t.cena ? t.cena + " Kč" : "Zdarma"}</p>

      ${t.popis ? `<p style="margin-top:10px;background:#f4f4f4;padding:10px;border-radius:10px;">
        ${t.popis}
      </p>` : ""}

      <input id="hrac" placeholder="Jméno hráče">
      <input id="rocnik,klub" placeholder="Ročník, klub">
      <input id="email" placeholder="Email rodiče">

      <button onclick="reserve()">Rezervovat</button>
      <button onclick="renderDay()">Zpět</button>

    </div>
  `;
}

// ================= RESERVE =================
async function reserve(){

  if(!selectedTraining){
    alert("Chyba: není vybraný trénink");
    return;
  }

  const hrac = document.getElementById("hrac").value;
  const rocnik_klub = document.getElementById("rocnik_klub").value;
  const email = document.getElementById("email").value;

  if(!hrac || !rocnik_klub || !email){
    alert("Vyplň údaje");
    return;
  }

  const t = selectedTraining;

  const { error } = await supabaseClient
    .from("rezervace")
    .insert([{
      trening_id: t.id,
      hrac,
      rocnik_klub,
      email
    }]);

  if(error){
    alert("Chyba rezervace");
    return;
  }

  await fetch("/.netlify/functions/send-email", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      hrac,
      email,
      treningId: t.id
    })
  });

  alert("Rezervace hotová 💪");

  await load();
  renderDay();
}

// ================= FORMAT =================
function formatDate(date){
  return new Date(date).toLocaleDateString("cs-CZ", {
    weekday:"long",
    day:"numeric",
    month:"numeric"
  });
}

load();

</script>

</body>
</html>
