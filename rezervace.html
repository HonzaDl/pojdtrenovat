<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rezervace tréninků | pojdtrenovat.cz</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styl.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    .rez-container {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    .card {
      background: #fff;
      padding: 20px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .row {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    input {
      padding: 8px;
      margin-top: 5px;
      width: 100%;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .full {
      color: red;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header class="header">
  <h1 class="site-title">Rezervace tréninků</h1>
  <nav class="nav">
    <a href="index.html">Úvod</a>
    <a href="rezervace.html">Rezervace</a>
  </nav>
</header>

<div class="rez-container" id="list"></div>

<script>
const supabaseClient = supabase.createClient(
  "https://kgmdyhiwkkviswluuwkg.supabase.co",
  "sb_publishable_kfn3T6iQ94DE9KLhH82jvw_zEJF-CqI"
);

async function load() {
  const { data, error } = await supabaseClient
    .from("treninky")
    .select("*");

  console.log("DATA:", data);
  console.log("ERROR:", error);

  const container = document.getElementById("list");

  container.innerHTML = JSON.stringify(data, null, 2);
}

  for (let t of treninky) {

    const { count } = await supabaseClient
      .from("rezervace")
      .select("*", { count: "exact", head: true })
      .eq("trening_id", t.id);

    const volno = t.kapacita - count;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h2>${t.nazev || "Trénink"}</h2>
      <p>${t.datum} | ${t.cas_od} - ${t.cas_do}</p>

      <div class="row">
        <div><b>Kapacita:</b> ${volno}/${t.kapacita}</div>
        ${volno <= 0 ? '<div class="full">PLNO</div>' : ''}
      </div>

      ${volno > 0 ? `
        <input id="jmeno-${t.id}" placeholder="Jméno">
        <input id="email-${t.id}" placeholder="Email">
        <button onclick="rezervuj('${t.id}')">Rezervovat</button>
      ` : ''}
    `;

    container.appendChild(div);
  }
}

async function rezervuj(id) {
  const jmeno = document.getElementById("jmeno-" + id).value;
  const email = document.getElementById("email-" + id).value;

  if (!jmeno || !email) {
    alert("Vyplň jméno a email");
    return;
  }

  await supabaseClient.from("rezervace").insert([
    { trening_id: id, jmeno, email }
  ]);

  alert("Rezervace hotová 💪");
  load();
}

load();
</script>
<script>
console.log("SUPABASE CLIENT:", supabaseClient);

const { data, error } = await supabaseClient
  .from("treninky")
  .select("*");

console.log("DATA:", data);
console.log("ERROR:", error);
</script>
</body>
</html>

</body>
</html>
