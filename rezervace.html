<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rezervace | pojdtrenovat.cz</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styl.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  font-family:Roboto;
  margin:0;
  background:#f4f6f8;
}

/* HEADER */
.header{
  background:#000;
  color:#fff;
  padding:10px 15px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.nav a{
  color:white;
  margin:0 8px;
  text-decoration:none;
}

.logos-right img{
  height:40px;
  margin-left:10px;
}

.back-btn{
  display:inline-block;
  margin:10px 15px;
  color:#000;
  text-decoration:none;
}

.container{
  max-width:900px;
  margin:20px auto;
  padding:10px;
}

/* CALENDAR */
.calendar-day{
  background:#fff;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border-left:4px solid #e00000;
  cursor:pointer;
}

/* CARD */
.card{
  background:#fff;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  border-left:4px solid #000;
}

input,button{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
}

button{
  background:#000;
  color:#fff;
  border:none;
}

.full{
  color:#e00000;
  font-weight:bold;
}
</style>
</head>

<body>

<header class="header">
  <h1>pojdtrenovat.cz</h1>
  <nav class="nav">
    <a href="index.html">Úvod</a>
    <a href="treneri.html">Trenéři</a>
    <a href="rezervace.html">Rezervace</a>
  </nav>
  <div class="logos-right">
    <img src="images/logoo.jpg">
    <img src="images/ssgihockey.jpg">
  </div>
</header>

<a href="javascript:history.back()" class="back-btn">← Zpět</a>

<div class="container">

<h2>Kalendář tréninků</h2>
<div id="calendar">Načítám...</div>

<h2>Rezervace</h2>
<div id="list"></div>

</div>

<script>
const supabaseClient = supabase.createClient(
  "https://kgmdyhiwkkviswluuwkg.supabase.co",
  "sb_publishable_kfn3T6iQ94DE9KLhH82jvw_zEJF-CqI"
);

let allData = [];
let selectedDay = null;

// EMAIL
async function sendEmailConfirmation(name, email){
  try {
    await fetch("https://api.resend.com/emails", {
      method: "POST",
      headers: {
        "Authorization": "Bearer re_4P3dnTes_P5wLsQviAWYAz81c6UbEZRtT",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        from: "onboarding@resend.dev",
        to: email,
        subject: "Potvrzení rezervace",
        html: `<h2>Ahoj ${name}</h2><p>Rezervace proběhla úspěšně 💪</p>`
      })
    });
  } catch(err){
    console.log(err);
  }
}

// LOAD
async function load(){
  const { data, error } = await supabaseClient
    .from("treninky")
    .select("*")
    .order("datum");

  if(error){
    console.log(error);
    return;
  }

  allData = data;
  renderCalendar();
}

// CALENDAR
function renderCalendar(){
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  let grouped = {};

  allData.forEach(t=>{
    if(!grouped[t.datum]) grouped[t.datum]=[];
    grouped[t.datum].push(t);
  });

  for(const date in grouped){
    const div = document.createElement("div");
    div.className = "calendar-day";

    div.innerHTML = `<b>${date}</b><br>${grouped[date].length} tréninků`;

    div.onclick = ()=>{
      selectedDay = grouped[date];
      renderList();
    };

    cal.appendChild(div);
  }
}

// LIST
async function renderList(){

  const list = document.getElementById("list");
  list.innerHTML = "";

  let data = selectedDay || allData;

  for (let t of data){

    const { count } = await supabaseClient
      .from("rezervace")
      .select("*", { count:"exact", head:true })
      .eq("trening_id", t.id);

    const volno = t.kapacita - count;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${t.nazev}</h3>
      <p>${t.datum} | ${t.cas_od} - ${t.cas_do}</p>
      <p>Místo: ${t.misto || "-"}</p>
      <p>Cena: ${t.cena ? t.cena + " Kč" : "Zdarma"}</p>
      <p><b>${count}/${t.kapacita}</b></p>

      ${volno > 0 ? `
        <input id="hrac-${t.id}" placeholder="Jméno hráče">
        <input id="vek-${t.id}" placeholder="Věk">
        <input id="email-${t.id}" placeholder="Email rodiče">
        <button onclick="reserve('${t.id}')">Rezervovat</button>
      ` : `<div class="full">PLNO</div>`}
    `;

    list.appendChild(div);
  }
}

// RESERVE
async function reserve(id){

  const hrac = document.getElementById("hrac-"+id).value;
  const vek = document.getElementById("vek-"+id).value;
  const email = document.getElementById("email-"+id).value;

  if(!hrac || !vek || !email){
    return alert("Vyplň údaje");
  }

  // DUPLICITA
  const { data: existing } = await supabaseClient
    .from("rezervace")
    .select("*")
    .eq("trening_id", id)
    .eq("hrac", hrac)
    .maybeSingle();

  if(existing){
    return alert("Hráč už je přihlášen");
  }

  // INSERT
  const { error } = await supabaseClient
    .from("rezervace")
    .insert([{ trening_id:id, hrac, vek, email }]);

  if(error){
    console.log(error);
    return alert("Chyba rezervace");
  }

  await sendEmailConfirmation(hrac, email);

  alert("Rezervace hotová 💪");
  load();
}

load();
</script>

</body>
</html>
