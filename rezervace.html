<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rezervace | pojdtrenovat.cz</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  font-family:Roboto;
  margin:0;
  background:#f4f6f8;
}

/* HEADER */
.header{
  background:#000;
  color:#fff;
  padding:10px 15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.nav a{
  color:#fff;
  margin:0 8px;
  text-decoration:none;
}

.logos-right img{
  height:40px;
  margin-left:10px;
}

/* CONTAINER */
.container{
  max-width:1000px;
  margin:20px auto;
  padding:10px;
}

/* WEEK NAV */
.week-nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

.week-nav button{
  background:#000;
  color:#fff;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}

/* CALENDAR (APP STYLE FIX) */
#calendar{
  display:grid;
  grid-template-columns: repeat(7, 1fr);
  gap:12px;
}

@media(max-width:900px){
  #calendar{
    grid-template-columns: repeat(2, 1fr);
  }
}

@media(max-width:500px){
  #calendar{
    grid-template-columns: 1fr;
  }
}

.calendar-day{
  background:#fff;
  border-radius:14px;
  padding:12px;
  box-shadow:0 4px 14px rgba(0,0,0,0.08);
}

.calendar-day b{
  display:block;
  margin-bottom:8px;
  font-size:13px;
  opacity:0.6;
}

/* TRAINING CARD */
.training{
  padding:10px;
  border-radius:10px;
  margin-top:6px;
  font-size:13px;
  cursor:pointer;
  border:1px solid rgba(0,0,0,0.06);
  transition:0.2s;
}

.training:hover{
  transform:scale(1.02);
}

.green{background:#eafaf1; border-left:4px solid #2ecc71;}
.yellow{background:#fff7e0; border-left:4px solid #f1c40f;}
.red{background:#ffe8e8; border-left:4px solid #e74c3c;}

/* ===== MODAL (APP FEELING) ===== */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal-content{
  width:95%;
  max-width:500px;
  background:#fff;
  border-radius:16px;
  padding:18px;
  position:relative;
  animation:pop .2s ease;
}

@keyframes pop{
  from{transform:scale(0.95);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

.close{
  position:absolute;
  top:10px;
  right:12px;
  font-size:22px;
  cursor:pointer;
}

/* FORM */
input,button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:14px;
}

button{
  background:#111;
  color:#fff;
  cursor:pointer;
}

button:hover{
  background:#e60000;
}

.detail-box{
  background:#f7f7f7;
  padding:10px;
  border-radius:10px;
  margin:10px 0;
  white-space:pre-line;
}
</style>
</head>

<body>

<header class="header">
  <h1>pojdtrenovat.cz</h1>

  <nav class="nav">
    <a href="index.html">Úvod</a>
    <a href="treneri.html">Trenéři</a>
    <a href="rezervace.html">Rezervace</a>
  </nav>

  <div class="logos-right">
    <img src="images/logoo.jpg">
    <img src="images/ssgihockey.jpg">
  </div>
</header>

<div class="container">

  <h2>Týdenní kalendář</h2>

  <div class="week-nav">
    <button onclick="changeWeek(-1)">← Předchozí</button>
    <div id="weekLabel"></div>
    <button onclick="changeWeek(1)">Další →</button>
  </div>

  <div id="calendar">Načítám...</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">

    <span class="close" onclick="closeModal()">×</span>

    <div id="modalBody"></div>

  </div>
</div>

<script>

const supabaseClient = supabase.createClient(
  "https://kgmdyhiwkkviswluuwkg.supabase.co",
  "sb_publishable_kfn3T6iQ94DE9KLhH82jvw_zEJF-CqI"
);

let allData = [];
let reservationCounts = {};
let selectedTraining = null;
let weekOffset = 0;

// LOAD
async function load(){

  const { data: treninky } = await supabaseClient
    .from("treninky")
    .select("*")
    .order("datum");

  const { data: rezervace } = await supabaseClient
    .from("rezervace")
    .select("trening_id");

  reservationCounts = {};
  (rezervace || []).forEach(r=>{
    reservationCounts[r.trening_id] = (reservationCounts[r.trening_id] || 0) + 1;
  });

  allData = treninky || [];
  renderWeek();
}

// WEEK
function changeWeek(dir){
  weekOffset += dir;
  renderWeek();
}

function renderWeek(){

  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  const today = new Date();

  const start = new Date(today);
  start.setDate(today.getDate() - today.getDay() + 1 + weekOffset * 7);

  document.getElementById("weekLabel").innerText =
    `${start.toLocaleDateString("cs-CZ")}`;

  const grouped = {};

  allData.forEach(t=>{
    if(!grouped[t.datum]) grouped[t.datum] = [];
    grouped[t.datum].push(t);
  });

  for(let i=0;i<7;i++){

    const d = new Date(start);
    d.setDate(start.getDate()+i);

    const date = d.toISOString().split("T")[0];

    const div = document.createElement("div");
    div.className = "calendar-day";

    let html = `<b>${d.toLocaleDateString("cs-CZ")}</b>`;

    (grouped[date] || []).forEach(t=>{

      const count = reservationCounts[t.id] || 0;
      const free = t.kapacita - count;

      let color = "green";
      if(free === 0) color = "red";
      else if(free <= 2) color = "yellow";

      html += `
        <div class="training ${color}" onclick="openModal('${t.id}')">
          ${t.nazev}<br>
          ${count}/${t.kapacita}
        </div>
      `;
    });

    div.innerHTML = html;
    cal.appendChild(div);
  }
}

// OPEN MODAL
function openModal(id){

  selectedTraining = allData.find(t => t.id === id);

  const t = selectedTraining;

  document.getElementById("modalBody").innerHTML = `
    <h2>${t.nazev}</h2>

    <div class="detail-box">
📅 ${t.datum}
⏰ ${t.cas_od} - ${t.cas_do}
📍 ${t.misto || "-"}
💰 ${t.cena ? t.cena + " Kč" : "Zdarma"}
    </div>

    ${t.popis ? `<div class="detail-box">${t.popis}</div>` : ""}

    <input id="hrac" placeholder="Jméno hráče">
    <input id="vek" placeholder="Věk">
    <input id="email" placeholder="Email rodiče">

    <button onclick="reserve()">Rezervovat</button>
  `;

  document.getElementById("modal").style.display = "flex";
}

// CLOSE
function closeModal(){
  document.getElementById("modal").style.display = "none";
}

// RESERVE
async function reserve(){

  const hrac = document.getElementById("hrac").value;
  const vek = document.getElementById("vek").value;
  const email = document.getElementById("email").value;

  if(!hrac || !vek || !email){
    alert("Vyplň údaje");
    return;
  }

  const t = selectedTraining;

  const { error } = await supabaseClient
    .from("rezervace")
    .insert([{ trening_id: t.id, hrac, vek, email }]);

  if(error){
    alert("Chyba rezervace");
    return;
  }

  await fetch("/.netlify/functions/send-email", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ hrac, email, treningId: t.id })
  });

  alert("Rezervace hotová 💪");
  closeModal();
  load();
}

load();

</script>

</body>
</html>
