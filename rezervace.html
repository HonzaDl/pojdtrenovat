<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rezervace | pojdtrenovat.cz</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<link rel="stylesheet" href="styl.css">
</head>

<body>

<header class="header">
  <h1 class="site-title">pojdtrenovat.cz</h1>

  <nav class="nav">
    <a href="index.html">Úvod</a>
    <a href="treneri.html">Trenéři</a>
    <a href="rezervace.html">Rezervace</a>
  </nav>

  <div class="logos-right">
    <img src="images/logoo.jpg" class="new-logo">
    <img src="images/ssgihockey.jpg" class="nav-logo">
  </div>
</header>

<a href="#" onclick="history.back(); return false;" class="back-btn">← Zpět</a>

<main class="container">
  <h2>Rezervace tréninků</h2>
  <div id="app">Načítám...</div>
</main>

<script>

const supabaseClient = supabase.createClient(
  "https://kgmdyhiwkkviswluuwkg.supabase.co",
  "sb_publishable_kfn3T6iQ94DE9KLhH82jvw_zEJF-CqI"
);

let all = [];
let days = [];
let selectedWeek = 0;
let selectedTraining = null;
let counts = {};

/* LOAD DATA */
async function load(){

  const { data: t } = await supabaseClient
    .from("treninky")
    .select("*");

  const { data: r } = await supabaseClient
    .from("rezervace")
    .select("trening_id");

  all = t || [];

  counts = {};
  (r || []).forEach(x=>{
    if(!x.trening_id) return;
    counts[x.trening_id] = (counts[x.trening_id] || 0) + 1;
  });

  days = [...new Set(all.map(x => x.datum).filter(Boolean))]
    .sort((a,b)=> new Date(a) - new Date(b));

  render();
}

/* FORMAT DATE */
function formatDate(date){
  return new Date(date).toLocaleDateString("cs-CZ", {
    weekday:"long",
    day:"numeric",
    month:"numeric"
  });
}

/* GET WEEK */
function getWeek(startDate){

  const start = new Date(startDate);
  const day = start.getDay();
  const diff = start.getDate() - day + (day === 0 ? -6 : 1);

  const monday = new Date(start.setDate(diff));

  let week = [];

  for(let i=0;i<7;i++){
    let d = new Date(monday);
    d.setDate(monday.getDate()+i);
    week.push(d.toISOString().split("T")[0]);
  }

  return week;
}

/* RENDER */
function render(){

  if(days.length === 0){
    document.getElementById("app").innerHTML = "<p>Žádné tréninky</p>";
    return;
  }

  const baseDate = days[0];
  const firstWeek = getWeek(baseDate);

  const weekStart = new Date(firstWeek[0]);
  weekStart.setDate(weekStart.getDate() + selectedWeek * 7);

  let week = [];

  for(let i=0;i<7;i++){
    let d = new Date(weekStart);
    d.setDate(weekStart.getDate()+i);
    week.push(d.toISOString().split("T")[0]);
  }

  let html = `
    <div class="app-header">
      <button onclick="changeWeek(-1)">←</button>
      <div>${formatDate(week[0])} – ${formatDate(week[6])}</div>
      <button onclick="changeWeek(1)">→</button>
    </div>
  `;

  week.forEach(date => {

    const list = all.filter(t => t.datum === date);
    const hasTraining = list.length > 0;

    let dayClass = "week-day";
    if(hasTraining) dayClass += " active";
    else dayClass += " empty";

    html += `<div class="${dayClass}">`;
    html += `<h3>${formatDate(date)}</h3>`;

    if(!hasTraining){
      html += `<p>Žádné tréninky</p>`;
    }

    html += `<div class="app-list">`;

    list.forEach(t=>{

      const count = counts[t.id] || 0;
      const cap = Number(t.kapacita || 0);
      const free = cap - count;

      let color = "green";
      if(free <= 0) color = "red";
      else if(free <= 2) color = "yellow";

      html += `
        <div class="app-card ${color}" onclick="openTraining('${t.id}')">
          <h3>${t.nazev}</h3>
          <p>${t.cas_od} - ${t.cas_do}</p>
          <p>${count}/${cap}</p>
        </div>
      `;
    });

    html += `</div></div>`;
  });

  document.getElementById("app").innerHTML = html;
}

/* DETAIL */
function openTraining(id){

  selectedTraining = all.find(x => x.id === id);
  const t = selectedTraining;

  document.getElementById("app").innerHTML = `
    <div class="bottom-sheet">

      <h2>${t.nazev}</h2>

      <p>📅 ${formatDate(t.datum)}</p>
      <p>⏰ ${t.cas_od} - ${t.cas_do}</p>
      <p>📍 ${t.misto || "-"}</p>
      <p>💰 ${t.cena ? t.cena + " Kč" : "Zdarma"}</p>

      ${t.popis ? `
        <p style="background:#f4f4f4;padding:10px;border-radius:10px;margin-top:10px;">
          ${t.popis}
        </p>` : ""}

      <input id="hrac" placeholder="Jméno hráče">
      <input id="rocnik_klub" placeholder="Ročník / klub">
      <input id="email" placeholder="Email rodiče">
      <input id="telefon" placeholder="Telefonní číslo" maxlength="9" inputmode="numeric">

      <button id="btn-rezervovat" onclick="reserve()">Rezervovat</button>
      <button onclick="render()">Zpět</button>

    </div>
  `;
}

/* RESERVE */
async function reserve(){

  const btn = document.getElementById("btn-rezervovat");
  btn.disabled = true;
  btn.textContent = "Odesílám...";

  const hrac = document.getElementById("hrac").value.trim();
  const rocnik_klub = document.getElementById("rocnik_klub").value.trim();
  const email = document.getElementById("email").value.trim();
  const telefon = document.getElementById("telefon").value.trim();

  if(!hrac || !rocnik_klub || !email || !telefon){
    alert("Vyplň všechny údaje");
    btn.disabled = false;
    btn.textContent = "Rezervovat";
    return;
  }

  if(!/^\d{9}$/.test(telefon)){
    alert("Telefon musí mít 9 číslic");
    btn.disabled = false;
    btn.textContent = "Rezervovat";
    return;
  }

  const { data: exist } = await supabaseClient
    .from("rezervace")
    .select("*")
    .eq("trening_id", selectedTraining.id)
    .eq("email", email);

  if(exist && exist.length > 0){
    alert("Na tento trénink už máš rezervaci 👌");
    btn.disabled = false;
    btn.textContent = "Rezervovat";
    return;
  }

  const { error } = await supabaseClient
    .from("rezervace")
    .insert([{
      trening_id: selectedTraining.id,
      hrac,
      rocnik_klub,
      email,
      telefon
    }]);

  if(error){
    alert("Chyba rezervace");
    btn.disabled = false;
    btn.textContent = "Rezervovat";
    return;
  }

  // --- EMAILY přes Edge Function ---
  const t = selectedTraining;

  try {
await fetch("https://kgmdyhiwkkviswluuwkg.supabase.co/functions/v1/smooth-worker", {
  method: "POST",
  headers: {
    "Content-Type": "application/json",
    "Authorization": "Bearer sb_publishable_kfn3T6iQ94DE9KLhH82jvw_zEJF-CqI"
  },
  body: JSON.stringify({
    hrac, rocnik_klub, email, telefon,
    nazev: t.nazev,
    datum: formatDate(t.datum),
    cas_od: t.cas_od,
    cas_do: t.cas_do,
    misto: t.misto,
    cena: t.cena
  })
});
  } catch(e) {
    console.error("Chyba odesílání emailu:", e);
  }

  alert("Rezervace hotová 💪");
  load();
}

/* WEEK SWITCH */
function changeWeek(dir){
  selectedWeek += dir;
  render();
}

load();

</script>

</body>
</html>
