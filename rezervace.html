<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rezervace tréninků</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  font-family:Roboto,sans-serif;
  margin:0;
  padding:16px;
  background:#f4f6f8;
}

.topbar{
  background:#000;
  color:#fff;
  padding:12px;
  border-radius:10px;
  margin-bottom:15px;
}

#calendar{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:10px;
}

.card{
  background:#fff;
  padding:12px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  cursor:pointer;
  border-left:4px solid #e00000;
}

.card small{color:#666;display:block;margin-top:5px}

.training{
  background:#fff;
  padding:12px;
  margin:10px 0;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  border-left:4px solid #000;
}

input,button{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
}

button{
  background:#000;
  color:#fff;
  border:none;
}

.full{color:#e00000;font-weight:bold}
</style>
</head>

<body>

<div class="topbar">
  <h1>Rezervace tréninků</h1>
</div>

<div id="calendar">Načítám...</div>
<div id="detail"></div>

<script>
const supabaseClient = supabase.createClient(
  "https://kgmdyhiwkkviswluuwkg.supabase.co",
  "sb_publishable_kfn3T6iQ94DE9KLhH82jvw_zEJF-CqI"
);

// LOAD CALENDAR
async function loadCalendar(){
  const {data,error}=await supabaseClient
    .from("treninky")
    .select("*")
    .order("datum");

  if(error){
    console.log(error);
    return;
  }

  const cal=document.getElementById("calendar");
  cal.innerHTML="";

  let grouped={};

  data.forEach(t=>{
    if(!grouped[t.datum]) grouped[t.datum]=[];
    grouped[t.datum].push(t);
  });

  for(const date in grouped){

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <b>${date}</b>
      <small>${grouped[date].length} tréninků</small>
    `;

    div.onclick=()=>showDay(grouped[date],date);

    cal.appendChild(div);
  }
}

// SHOW DAY (FIXED)
async function showDay(treninky,date){

  const detail=document.getElementById("detail");
  detail.innerHTML=`<h2>📅 ${date}</h2>`;

  for(const t of treninky){

    const {count}=await supabaseClient
      .from("rezervace")
      .select("*",{count:"exact",head:true})
      .eq("trening_id",t.id);

    const obsazeno=count||0;
    const volno=t.kapacita-obsazeno;

    const div=document.createElement("div");
    div.className="training";

    div.innerHTML=`
      <b>${t.nazev}</b><br>
      🕒 ${t.cas_od} - ${t.cas_do}<br>
      👥 ${obsazeno}/${t.kapacita}

      ${volno>0 ? `
        <input id="n-${t.id}" placeholder="Jméno">
        <input id="e-${t.id}" placeholder="Email">
        <button onclick="reserve('${t.id}')">Rezervovat</button>
      ` : `<div class="full">PLNO</div>`}
    `;

    detail.appendChild(div);
  }
}

// RESERVE
async function reserve(id){

  const name=document.getElementById("n-"+id).value;
  const email=document.getElementById("e-"+id).value;

  if(!name||!email) return alert("Vyplň údaje");

  const {error}=await supabaseClient
    .from("rezervace")
    .insert([{trening_id:id,jmeno:name,email}]);

  if(error){
    console.log(error);
    return alert("Chyba rezervace");
  }

  alert("Rezervováno 💪");
  loadCalendar();
}

loadCalendar();
</script>

</body>
</html>
