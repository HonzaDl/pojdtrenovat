<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rezervace | pojdtrenovat.cz</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<link rel="stylesheet" href="styl.css">
</head>

<body>

<header class="header">
  <h1 class="site-title">pojdtrenovat.cz</h1>

  <nav class="nav">
    <a href="index.html">Úvod</a>
    <a href="treneri.html">Trenéři</a>
    <a href="rezervace.html">Rezervace</a>
  </nav>

  <div class="logos-right">
    <img src="images/logoo.jpg" class="new-logo">
    <img src="images/ssgihockey.jpg" class="nav-logo">
  </div>
</header>

<main class="container">
  <h2>Rezervace tréninků</h2>
  <div id="app">Načítám...</div>
</main>

<script>
const supabaseClient = supabase.createClient(
  "https://kgmdyhiwkkviswluuwkg.supabase.co",
  "sb_publishable_kfn3T6iQ94DE9KLhH82jvw_zEJF-CqI"
);

let all = [];
let days = [];
let selectedDay = 0;
let selectedTraining = null;
let reservationCounts = {};

/* ================= LOAD ================= */
async function load(){

  const { data: treninky } = await supabaseClient
    .from("treninky")
    .select("*");

  const { data: rezervace } = await supabaseClient
    .from("rezervace")
    .select("trening_id");

  reservationCounts = {};

  (rezervace || []).forEach(r=>{
    if(!r.trening_id) return;
    reservationCounts[r.trening_id] =
      (reservationCounts[r.trening_id] || 0) + 1;
  });

  all = treninky || [];

  const unique = [...new Set(all.map(t => t.datum).filter(Boolean))];
  days = unique.sort((a,b)=> new Date(a) - new Date(b));

  if(selectedDay < 0) selectedDay = 0;
  if(selectedDay >= days.length) selectedDay = 0;

  renderDay();
}

/* ================= DAY VIEW ================= */
function renderDay(){

  const date = days[selectedDay];
  const trainings = all.filter(t => t.datum === date);

  let html = `
    <div class="app-header">
      <button onclick="changeDay(-1)">←</button>
      <div>${formatDate(date)}</div>
      <button onclick="changeDay(1)">→</button>
    </div>

    <div class="app-list">
  `;

  trainings.forEach(t=>{

    const count = reservationCounts[t.id] || 0;
    const cap = Number(t.kapacita || 0);
    const free = cap - count;

    let color = "green";
    if(free <= 0) color = "red";
    else if(free <= 2) color = "yellow";

    html += `
      <div class="app-card ${color}" onclick="openTraining('${t.id}')">
        <h3>${t.nazev}</h3>
        <p>${t.cas_od} - ${t.cas_do}</p>
        <p>${count}/${cap}</p>
      </div>
    `;
  });

  html += `</div>`;

  document.getElementById("app").innerHTML = html;
}

/* ================= DAY CHANGE ================= */
function changeDay(dir){
  selectedDay += dir;
  if(selectedDay < 0) selectedDay = 0;
  if(selectedDay >= days.length) selectedDay = days.length - 1;
  renderDay();
}

/* ================= DETAIL ================= */
function openTraining(id){

  selectedTraining = all.find(t => t.id === id);

  if(!selectedTraining) return;

  const t = selectedTraining;

  document.getElementById("app").innerHTML = `
    <div class="bottom-sheet">

      <h2>${t.nazev}</h2>

      <p>📅 ${t.datum}</p>
      <p>⏰ ${t.cas_od} - ${t.cas_do}</p>
      <p>📍 ${t.misto || "-"}</p>
      <p>💰 ${t.cena ? t.cena + " Kč" : "Zdarma"}</p>

      ${t.popis ? `<p style="margin-top:10px;background:#f4f4f4;padding:10px;border-radius:10px;">
        ${t.popis}
      </p>` : ""}

      <input id="hrac" placeholder="Jméno hráče">
      <input id="rocnik_klub" placeholder="Ročník / klub">
      <input id="email" placeholder="Email rodiče">

      <button onclick="reserve()">Rezervovat</button>
      <button onclick="renderDay()">Zpět</button>

    </div>
  `;
}

/* ================= RESERVE ================= */
async function reserve(){

  const hrac = document.getElementById("hrac").value.trim();
  const rocnik_klub = document.getElementById("rocnik_klub").value.trim();
  const email = document.getElementById("email").value.trim();

  if(!hrac || !rocnik_klub || !email){
    alert("Vyplň všechny údaje");
    return;
  }

  const t = selectedTraining;

  const { error } = await supabaseClient
    .from("rezervace")
    .insert([{
      trening_id: t.id,
      hrac,
      rocnik_klub,
      email
    }]);

  if(error){
    alert("Chyba rezervace");
    return;
  }

  try{
    await fetch("/.netlify/functions/send-email", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        hrac,
        email,
        treningId: t.id
      })
    });
  }catch(e){}

  alert("Rezervace hotová 💪");

  await load();
}

/* ================= FORMAT ================= */
function formatDate(date){
  return new Date(date).toLocaleDateString("cs-CZ", {
    weekday:"long",
    day:"numeric",
    month:"numeric"
  });
}

load();
</script>

</body>
</html>
