<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rezervace | pojdtrenovat.cz</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styl.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  font-family:Roboto,sans-serif;
  margin:0;
  background:#f4f6f8;
}

/* calendar */
#calendar{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:10px;
  padding:16px;
}

.card{
  background:#fff;
  padding:12px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  cursor:pointer;
  border-left:4px solid #e00000;
}

.card small{color:#666;display:block;margin-top:5px}

/* detail */
#detail{padding:16px}

.training{
  background:#fff;
  padding:12px;
  margin:10px 0;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  border-left:4px solid #000;
}

/* tags */
.tag{
  display:inline-block;
  padding:3px 8px;
  border-radius:6px;
  font-size:12px;
  margin:3px 3px 0 0;
  color:#fff;
}

.tag-price{background:#000;}
.tag-place{background:#666;}
.tag-type{background:#e00000;}

input,button{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
}

button{
  background:#000;
  color:#fff;
  border:none;
}

.full{
  color:#e00000;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- HEADER (tvůj původní styl) -->
<header class="header">
  <div class="header-left">
    <h1 class="site-title">pojdtrenovat.cz</h1>
  </div>

  <nav class="nav">
    <a href="index.html">Úvod</a>
    <a href="treneri.html">Trenéři</a>
    <a href="rezervace.html">Rezervace</a>
  </nav>

  <div class="logos-right">
    <img src="images/logoo.jpg" class="new-logo">
    <img src="images/ssgihockey.jpg" class="nav-logo">
  </div>
</header>

<a href="javascript:history.back()" class="back-btn">← Zpět</a>

<!-- CALENDAR -->
<div id="calendar">Načítám...</div>

<!-- DETAIL -->
<div id="detail"></div>

<script>

const supabaseClient = supabase.createClient(
  "https://kgmdyhiwkkviswluuwkg.supabase.co",
  "sb_publishable_kfn3T6iQ94DE9KLhH82jvw_zEJF-CqI"
);

// ---------------- AUTO TAGS ----------------
function renderTags(t){

  let html = "";

  if(t.cena){
    html += `<span class="tag tag-price">💰 ${t.cena} Kč</span>`;
  }

  if(t.misto){
    html += `<span class="tag tag-place">📍 ${t.misto}</span>`;
  }

  if(t.typ){
    html += `<span class="tag tag-type">${t.typ}</span>`;
  }

  return html;
}

// ---------------- CALENDAR ----------------
async function loadCalendar(){

  const {data,error}=await supabaseClient
    .from("treninky")
    .select("*")
    .order("datum");

  if(error){
    console.log(error);
    return;
  }

  const cal=document.getElementById("calendar");
  cal.innerHTML="";

  let grouped={};

  data.forEach(t=>{
    if(!grouped[t.datum]) grouped[t.datum]=[];
    grouped[t.datum].push(t);
  });

  for(const date in grouped){

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <b>${date}</b>
      <small>${grouped[date].length} tréninků</small>
    `;

    div.onclick=()=>showDay(grouped[date],date);

    cal.appendChild(div);
  }
}

// ---------------- DETAIL ----------------
async function showDay(treninky,date){

  const detail=document.getElementById("detail");
  detail.innerHTML=`<h2>📅 ${date}</h2>`;

  for(const t of treninky){

    const {count}=await supabaseClient
      .from("rezervace")
      .select("*",{count:"exact",head:true})
      .eq("trening_id",t.id);

    const obsazeno=count||0;
    const volno=t.kapacita-obsazeno;

    const div=document.createElement("div");
    div.className="training";

    div.innerHTML=`
      <b>${t.nazev}</b><br>
      🕒 ${t.cas_od} - ${t.cas_do}<br>

      ${renderTags(t)}

      <br>👥 ${obsazeno}/${t.kapacita}

      ${volno>0 ? `
        <input id="n-${t.id}" placeholder="Jméno">
        <input id="e-${t.id}" placeholder="Email">
        <button onclick="reserve('${t.id}')">Rezervovat</button>
      ` : `<div class="full">PLNO</div>`}
    `;

    detail.appendChild(div);
  }
}

// ---------------- RESERVATION ----------------
async function reserve(id){

  const name=document.getElementById("n-"+id).value;
  const email=document.getElementById("e-"+id).value;

  if(!name||!email) return alert("Vyplň údaje");

  const {error}=await supabaseClient
    .from("rezervace")
    .insert([{trening_id:id,jmeno:name,email}]);

  if(error){
    console.log(error);
    return alert("Chyba rezervace");
  }

  alert("Rezervováno 💪");
  loadCalendar();
}

loadCalendar();

</script>

</body>
</html>
