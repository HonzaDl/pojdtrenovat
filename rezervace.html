<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rezervace | pojdtrenovat.cz</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{font-family:Roboto;margin:0;background:#f4f6f8;}

.header{
  background:#000;
  color:#fff;
  padding:10px 15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.nav a{color:#fff;margin:0 8px;text-decoration:none;}

.logos-right img{height:40px;margin-left:10px;}

.container{max-width:1000px;margin:20px auto;padding:10px;}

.calendar-day{
  background:#fff;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border-left:4px solid #000;
}

.training{
  padding:8px;
  margin-top:6px;
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
}

.green{background:#c8f7c5;}
.yellow{background:#ffeaa7;}
.red{background:#ffb3b3;}

.card{
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-top:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input,button{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
}

button{background:#000;color:#fff;border:none;cursor:pointer;}
.full{color:red;font-weight:bold;}
</style>
</head>

<body>

<header class="header">
  <h1>pojdtrenovat.cz</h1>
  <nav class="nav">
    <a href="index.html">Úvod</a>
    <a href="treneri.html">Trenéři</a>
    <a href="rezervace.html">Rezervace</a>
  </nav>

  <div class="logos-right">
    <img src="images/logoo.jpg">
    <img src="images/ssgihockey.jpg">
  </div>
</header>

<div class="container">

  <h2>Kalendář tréninků</h2>
  <div id="calendar">Načítám...</div>

  <h2>Detail</h2>
  <div id="list"></div>

</div>

<script>

const supabaseClient = supabase.createClient(
  "https://kgmdyhiwkkviswluuwkg.supabase.co",
  "sb_publishable_kfn3T6iQ94DE9KLhH82jvw_zEJF-CqI"
);

let allData = [];
let reservationCounts = {};
let selectedTraining = null;

// ================= LOAD =================
async function load(){

  const { data: treninky } = await supabaseClient
    .from("treninky")
    .select("*")
    .order("datum");

  const { data: rezervace } = await supabaseClient
    .from("rezervace")
    .select("trening_id");

  reservationCounts = {};
  (rezervace || []).forEach(r=>{
    reservationCounts[r.trening_id] = (reservationCounts[r.trening_id] || 0) + 1;
  });

  allData = treninky || [];
  renderCalendar();
}

// ================= CALENDAR =================
function renderCalendar(){

  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  const grouped = {};

  allData.forEach(t=>{
    if(!grouped[t.datum]) grouped[t.datum] = [];
    grouped[t.datum].push(t);
  });

  const sorted = Object.keys(grouped).sort();

  sorted.forEach(date=>{

    const div = document.createElement("div");
    div.className = "calendar-day";

    let html = `<b>${formatDate(date)}</b>`;

    grouped[date].forEach(t=>{

      const count = reservationCounts[t.id] || 0;
      const free = t.kapacita - count;

      let color = "green";
      if(free === 0) color = "red";
      else if(free <= 2) color = "yellow";

      html += `
        <div class="training ${color}"
          onclick="openTraining('${t.id}')">
          ${t.nazev}<br>
          ${count}/${t.kapacita}
        </div>
      `;
    });

    div.innerHTML = html;
    cal.appendChild(div);
  });
}

// ================= OPEN TRAINING =================
function openTraining(id){

  selectedTraining = allData.find(t => t.id === id);

  const t = selectedTraining;

  document.getElementById("list").innerHTML = `
    <div class="card">
      <h3>${t.nazev}</h3>
      <p>${t.datum} | ${t.cas_od} - ${t.cas_do}</p>
      <p>📍 ${t.misto || "-"}</p>

      <input id="hrac" placeholder="Jméno hráče">
      <input id="vek" placeholder="Věk">
      <input id="email" placeholder="Email rodiče">

      <button onclick="reserve()">Rezervovat</button>
    </div>
  `;
}

// ================= RESERVE =================
async function reserve(){

  const hrac = document.getElementById("hrac").value;
  const vek = document.getElementById("vek").value;
  const email = document.getElementById("email").value;

  if(!hrac || !vek || !email){
    alert("Vyplň údaje");
    return;
  }

  const t = selectedTraining;

  const { error } = await supabaseClient
    .from("rezervace")
    .insert([{
      trening_id: t.id,
      hrac,
      vek,
      email
    }]);

  if(error){
    alert("Chyba rezervace");
    return;
  }

  await fetch("/.netlify/functions/send-email", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      hrac,
      email,
      treningId: t.id
    })
  });

  alert("Rezervace hotová 💪");
  load();
  document.getElementById("list").innerHTML = "";
}

// ================= FORMAT =================
function formatDate(dateStr){
  const d = new Date(dateStr);

  return d.toLocaleDateString("cs-CZ", {
    weekday:"long",
    day:"numeric",
    month:"numeric"
  });
}

load();

</script>

</body>
</html>
