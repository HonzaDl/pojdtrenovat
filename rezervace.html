<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rezervace | Pojdtrenovat.cz</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styl.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Roboto, sans-serif;
      background:#f4f6f8;
      margin:0;
      padding:20px;
    }

    .header {
      background:black;
      color:white;
      padding:15px;
      text-align:center;
      margin-bottom:20px;
    }

    .card {
      background:white;
      padding:15px;
      margin:10px 0;
      border-radius:8px;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }

    input {
      width:100%;
      padding:8px;
      margin-top:5px;
    }

    button {
      width:100%;
      margin-top:10px;
      padding:10px;
      background:black;
      color:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }

    .full {
      color:red;
      font-weight:bold;
    }
  </style>
</head>

<body>

<div class="header">
  <h1>Rezervace tréninků</h1>
</div>

<div id="list">Načítám...</div>

<script>
const supabaseClient = supabase.createClient(
  "https://kgmdyhiwkkviswluuwkg.supabase.co",
  "sb_publishable_kfn3T6iQ94DE9KLhH82jvw_zEJF-CqI"
);

async function load() {
  const container = document.getElementById("list");
  container.innerHTML = "Načítám...";

  const { data: treninky, error } = await supabaseClient
    .from("treninky")
    .select("*");

  if (error) {
    container.innerHTML = "Chyba načítání";
    return;
  }

  container.innerHTML = "";

  for (let t of treninky) {

    const { count } = await supabaseClient
      .from("rezervace")
      .select("*", { count: "exact", head: true })
      .eq("trening_id", t.id);

    const obsazeno = count || 0;
    const volno = t.kapacita - obsazeno;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h2>${t.nazev}</h2>
      <p>${t.datum} ${t.cas_od} - ${t.cas_do}</p>

      <p><b>Obsazeno:</b> ${obsazeno}/${t.kapacita}</p>

      ${volno > 0 ? `
        <input id="name-${t.id}" placeholder="Jméno">
        <input id="email-${t.id}" placeholder="Email">
        <button onclick="reserve('${t.id}')">Rezervovat</button>
      ` : `<p class="full">PLNO</p>`}
    `;

    container.appendChild(div);
  }
}

async function reserve(id) {
  const name = document.getElementById("name-" + id).value;
  const email = document.getElementById("email-" + id).value;

  if (!name || !email) {
    alert("Vyplň jméno a email");
    return;
  }

  // kontrola kapacity ještě před zápisem
  const { count } = await supabaseClient
    .from("rezervace")
    .select("*", { count: "exact", head: true })
    .eq("trening_id", id);

  const { data: trening } = await supabaseClient
    .from("treninky")
    .select("kapacita")
    .eq("id", id)
    .single();

  if (count >= trening.kapacita) {
    alert("Trénink je plný");
    load();
    return;
  }

  const { error } = await supabaseClient
    .from("rezervace")
    .insert([{ trening_id: id, jmeno: name, email }]);

  if (error) {
    alert("Chyba rezervace");
    console.log(error);
    return;
  }

  alert("Rezervace hotová 💪");
  load();
}

load();
</script>

</body>
</html>
