<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rezervace | pojdtrenovat.cz</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{font-family:Roboto;margin:0;background:#f4f6f8;}

.header{
  background:#000;color:#fff;padding:10px 15px;
  display:flex;justify-content:space-between;align-items:center;
}

.nav a{color:#fff;margin:0 8px;text-decoration:none;}

.container{max-width:1100px;margin:20px auto;padding:10px;}

.week{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:10px;
}

.day{
  background:#fff;
  border-radius:10px;
  padding:10px;
  min-height:120px;
}

.day h4{
  margin:0 0 10px 0;
  font-size:14px;
}

.training{
  padding:6px;
  margin-bottom:6px;
  border-radius:6px;
  font-size:12px;
  cursor:pointer;
  color:#000;
}

.green{background:#c8f7c5;}
.yellow{background:#ffeaa7;}
.red{background:#ffb3b3;}

.modal{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content{
  background:#fff;
  padding:20px;
  border-radius:10px;
  width:320px;
}

input,button{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
}

button{background:#000;color:#fff;border:none;cursor:pointer;}

.close{
  float:right;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <h1>Rezervace</h1>
</div>

<div class="container">
  <h2>Týdenní kalendář</h2>
  <div id="week" class="week"></div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>

    <h3 id="t_nazev"></h3>
    <p id="t_info"></p>

    <input id="hrac" placeholder="Jméno hráče">
    <input id="vek" placeholder="Věk">
    <input id="email" placeholder="Email rodiče">

    <button onclick="reserve()">Rezervovat</button>
  </div>
</div>

<script>

const supabaseClient = supabase.createClient(
  "https://kgmdyhiwkkviswluuwkg.supabase.co",
  "sb_publishable_kfn3T6iQ94DE9KLhH82jvw_zEJF-CqI"
);

let data = [];
let selected = null;
let counts = {};

// ---------------- LOAD ----------------
async function load(){

  const { data: t } = await supabaseClient
    .from("treninky")
    .select("*")
    .order("datum");

  const { data: r } = await supabaseClient
    .from("rezervace")
    .select("trening_id");

  counts = {};
  (r || []).forEach(x=>{
    counts[x.trening_id] = (counts[x.trening_id] || 0) + 1;
  });

  data = t || [];
  renderWeek();
}

// ---------------- WEEK ----------------
function renderWeek(){

  const el = document.getElementById("week");
  el.innerHTML = "";

  const today = new Date();
  const start = new Date(today);
  start.setDate(today.getDate() - today.getDay() + 1); // pondělí

  const weekDays = [];

  for(let i=0;i<7;i++){
    const d = new Date(start);
    d.setDate(start.getDate()+i);
    weekDays.push(d.toISOString().split("T")[0]);
  }

  weekDays.forEach(date => {

    const dayDiv = document.createElement("div");
    dayDiv.className = "day";

    const trainings = data.filter(t => t.datum === date);

    let html = `<h4>${formatDate(date)}</h4>`;

    trainings.forEach(t => {

      const count = counts[t.id] || 0;
      const free = t.kapacita - count;

      let color = "green";
      if(free === 0) color = "red";
      else if(free <= 2) color = "yellow";

      html += `
        <div class="training ${color}"
          onclick='openModal(${JSON.stringify(t)})'>
          ${t.nazev}<br>
          ${count}/${t.kapacita}
        </div>
      `;
    });

    dayDiv.innerHTML = html;
    el.appendChild(dayDiv);
  });
}

// ---------------- MODAL ----------------
function openModal(t){
  selected = t;

  document.getElementById("t_nazev").innerText = t.nazev;

  document.getElementById("t_info").innerText =
    `${t.datum} | ${t.cas_od} - ${t.cas_do}`;

  document.getElementById("modal").style.display = "flex";
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

// ---------------- RESERVE ----------------
async function reserve(){

  const hrac = document.getElementById("hrac").value;
  const vek = document.getElementById("vek").value;
  const email = document.getElementById("email").value;

  if(!hrac || !vek || !email){
    alert("Vyplň údaje");
    return;
  }

  const { error } = await supabaseClient
    .from("rezervace")
    .insert([{
      trening_id: selected.id,
      hrac,
      vek,
      email
    }]);

  if(error){
    alert("Chyba rezervace");
    return;
  }

  await fetch("/.netlify/functions/send-email", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      hrac,
      email,
      treningId: selected.id
    })
  });

  alert("Rezervace hotová 💪");
  closeModal();
  load();
}

// ---------------- FORMAT ----------------
function formatDate(dateStr){
  const d = new Date(dateStr);

  return d.toLocaleDateString("cs-CZ", {
    weekday:"long",
    day:"numeric",
    month:"numeric"
  });
}

load();

</script>

</body>
</html>
