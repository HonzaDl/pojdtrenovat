<script>
const supabaseClient = supabase.createClient(
  "https://kgmdyhiwkkviswluuwkg.supabase.co",
  "sb_publishable_kfn3T6iQ94DE9KLhH82jvw_zEJF-CqI"
);

async function load() 
async function reserve(id) {
  const name = document.getElementById("name-" + id).value;
  const email = document.getElementById("email-" + id).value;

  if (!name || !email) {
    alert("Vyplň jméno a email");
    return;
  }

  const { error } = await supabaseClient
    .from("rezervace")
    .insert([
      {
        trening_id: id,
        jmeno: name,
        email: email
      }
    ]);

  if (error) {
    alert("Chyba rezervace");
    console.log(error);
    return;
  }

  alert("Rezervace hotová 💪");
  load();
}
{
  const container = document.getElementById("list");
  container.innerHTML = "Načítám...";

  const { data, error } = await supabaseClient
    .from("treninky")
    .select("*");

  console.log(data, error);

  if (error) {
    container.innerHTML = "Chyba načítání";
    return;
  }

  container.innerHTML = "";

  data.forEach(t => {

  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <h2>${t.nazev}</h2>
    <p>${t.datum} ${t.cas_od} - ${t.cas_do}</p>
    <p>Kapacita: ${t.kapacita}</p>

    <input id="name-${t.id}" placeholder="Jméno">
    <input id="email-${t.id}" placeholder="Email">
    <button onclick="reserve('${t.id}')">Rezervovat</button>
  `;

  container.appendChild(div);
});
}

load();
