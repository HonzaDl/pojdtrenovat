<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rezervace | Pojdtrenovat.cz</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Roboto;
      background:#f4f6f8;
      margin:0;
      padding:20px;
    }

    .hidden { display:none; }

    .card {
      background:#fff;
      padding:15px;
      margin:10px 0;
      border-radius:8px;
    }

    button {
      padding:10px;
      width:100%;
      margin-top:10px;
    }

    .calendar-day {
      background:#fff;
      margin:10px 0;
      padding:15px;
      border-radius:10px;
      cursor:pointer;
    }

    .calendar-items {
      display:none;
      margin-top:10px;
    }

    .calendar-items.active {
      display:block;
    }

    .admin-panel {
      margin-top:20px;
      padding:15px;
      background:#fff;
      border-radius:10px;
    }
  </style>
</head>

<body>

<h1>Rezervace</h1>

<!-- LOGIN -->
<div id="loginBox">
  <h3>Admin login</h3>
  <input id="email" placeholder="Email">
  <button onclick="login()">Přihlásit</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <h2>Klikací kalendář</h2>
  <div id="calendar"></div>

  <div class="admin-panel hidden" id="adminPanel">
    <h3>Admin - přidat trénink</h3>

    <input id="nazev" placeholder="Název">
    <input id="datum" type="date">
    <input id="od" type="time">
    <input id="do" type="time">
    <input id="kapacita" type="number">

    <button onclick="addTraining()">Přidat</button>
  </div>

</div>

<script>
const supabaseClient = supabase.createClient(
  "https://kgmdyhiwkkviswluuwkg.supabase.co",
  "sb_publishable_kfn3T6iQ94DE9KLhH82jvw_zEJF-CqI"
);

let isAdmin = false;

async function login() {
  const email = document.getElementById("email").value;

  const { data } = await supabaseClient
    .from("treneri")
    .select("*")
    .eq("email", email)
    .single();

  if (!data) {
    alert("Nepovolený přístup");
    return;
  }

  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  if (data.role === "admin") {
    isAdmin = true;
    document.getElementById("adminPanel").classList.remove("hidden");
  }

  loadCalendar();
}

async function loadCalendar() {
  const { data } = await supabaseClient
    .from("treninky")
    .select("*")
    .order("datum");

  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  let grouped = {};

  data.forEach(t => {
    if (!grouped[t.datum]) grouped[t.datum] = [];
    grouped[t.datum].push(t);
  });

  for (const date in grouped) {

    const day = document.createElement("div");
    day.className = "calendar-day";

    let html = `<b>${date}</b>`;

    html += `<div class="calendar-items">`;

    grouped[date].forEach(t => {
      html += `
        <div class="card">
          ${t.nazev}<br>
          ${t.cas_od} - ${t.cas_do}
        </div>
      `;
    });

    html += `</div>`;

    day.innerHTML = html;

    day.onclick = () => {
      day.querySelector(".calendar-items").classList.toggle("active");
    };

    cal.appendChild(day);
  }
}

async function addTraining() {
  const nazev = document.getElementById("nazev").value;
  const datum = document.getElementById("datum").value;
  const od = document.getElementById("od").value;
  const doo = document.getElementById("do").value;
  const kapacita = document.getElementById("kapacita").value;

  await supabaseClient.from("treninky").insert([{
    nazev,
    datum,
    cas_od: od,
    cas_do: doo,
    kapacita
  }]);

  alert("Přidáno 💪");
  loadCalendar();
}
</script>

</body>
</html>
