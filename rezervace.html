<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rezervace | pojdtrenovat.cz</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
  font-family:Roboto;
  margin:0;
  background:#f2f2f2;
  color:#111;
}

/* HEADER */
.header{
  background:#111;
  color:#fff;
  padding:12px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.nav a{
  color:#fff;
  margin:0 8px;
  text-decoration:none;
  font-weight:bold;
}

.nav a:hover{
  color:#e60000;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:15px;
}

/* DATE HEADER */
.app-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  background:#fff;
  border-radius:14px;
  box-shadow:0 4px 14px rgba(0,0,0,0.06);
  margin-bottom:12px;
  font-weight:bold;
}

.app-header button{
  width:44px;
  height:44px;
  border-radius:10px;
  border:none;
  background:#111;
  color:#fff;
  cursor:pointer;
}

.app-header button:hover{
  background:#e60000;
}

/* LIST */
.app-list{
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* CARD */
.app-card{
  background:#fff;
  padding:14px;
  border-radius:16px;
  box-shadow:0 4px 14px rgba(0,0,0,0.06);
  cursor:pointer;
  transition:0.2s;
  border-left:4px solid #111;
}

.app-card:hover{
  transform:scale(1.02);
}

.app-card h3{
  margin:0;
  margin-bottom:6px;
}

/* COLORS */
.green{ border-left-color:#111; }
.yellow{ border-left-color:#e60000; }
.red{ border-left-color:#e60000; opacity:0.6; }

/* DETAIL */
.bottom-sheet{
  background:#fff;
  padding:16px;
  border-radius:18px;
  box-shadow:0 6px 20px rgba(0,0,0,0.12);
}

/* INPUTS */
input,button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #ddd;
}

button{
  background:#111;
  color:#fff;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#e60000;
}

.back-btn{
  background:#fff;
  color:#111;
  border:1px solid #ddd;
}

</style>
</head>

<body>

<header class="header">
  <h2>pojdtrenovat.cz</h2>
  <nav class="nav">
    <a href="index.html">Úvod</a>
    <a href="treneri.html">Trenéři</a>
    <a href="rezervace.html">Rezervace</a>
  </nav>
</header>

<div class="container">
  <h2>Tréninky</h2>
  <div id="app">Načítám...</div>
</div>

<script>

const supabaseClient = supabase.createClient(
  "https://kgmdyhiwkkviswluuwkg.supabase.co",
  "sb_publishable_kfn3T6iQ94DE9KLhH82jvw_zEJF-CqI"
);

let allData = [];
let reservationCounts = {};
let days = [];
let selectedDay = 0;
let selectedTraining = null;

/* LOAD */
async function load(){

  const { data: treninky } = await supabaseClient
    .from("treninky")
    .select("*");

  const { data: rezervace } = await supabaseClient
    .from("rezervace")
    .select("trening_id");

  reservationCounts = {};

  (rezervace || []).forEach(r=>{
    if(!r.trening_id) return;
    reservationCounts[r.trening_id] =
      (reservationCounts[r.trening_id] || 0) + 1;
  });

  allData = treninky || [];

  const unique = [...new Set(allData.map(t => t.datum).filter(Boolean))];
  days = unique.sort((a,b)=> new Date(a) - new Date(b));

  if(selectedDay >= days.length) selectedDay = 0;

  renderDay();
}

/* RENDER DAY */
function renderDay(){

  const date = days[selectedDay];

  const trainings = allData.filter(t => t.datum === date);

  let html = `
    <div class="app-header">
      <button onclick="changeDay(-1)">←</button>
      <div>${formatDate(date)}</div>
      <button onclick="changeDay(1)">→</button>
    </div>

    <div class="app-list">
  `;

  trainings.forEach(t=>{

    const count = reservationCounts[t.id] || 0;
    const cap = Number(t.kapacita || 0);
    const free = cap - count;

    let color = "green";
    if(free <= 0) color = "red";
    else if(free <= 2) color = "yellow";

    html += `
      <div class="app-card ${color}" onclick="openTraining('${t.id}')">
        <h3>${t.nazev || "Trénink"}</h3>
        <p>${t.cas_od || ""} - ${t.cas_do || ""}</p>
        <p>${count}/${cap}</p>
      </div>
    `;
  });

  html += `</div>`;

  document.getElementById("app").innerHTML = html;
}

/* CHANGE DAY */
function changeDay(dir){
  selectedDay += dir;
  if(selectedDay < 0) selectedDay = 0;
  if(selectedDay >= days.length) selectedDay = days.length - 1;
  renderDay();
}

/* OPEN DETAIL */
function openTraining(id){

  selectedTraining = allData.find(t => t.id === id);

  if(!selectedTraining){
    alert("Trénink nenalezen");
    return;
  }

  const t = selectedTraining;

  document.getElementById("app").innerHTML = `
    <div class="bottom-sheet">

      <h2>${t.nazev || ""}</h2>

      <p>📅 ${t.datum || "-"}</p>
      <p>⏰ ${t.cas_od || ""} - ${t.cas_do || ""}</p>
      <p>📍 ${t.misto || "-"}</p>
      <p>💰 ${t.cena ? t.cena + " Kč" : "Zdarma"}</p>

      ${t.popis ? `<p style="margin-top:10px;background:#f4f4f4;padding:10px;border-radius:10px;">
        ${t.popis}
      </p>` : ""}

      <input id="hrac" placeholder="Jméno hráče">
      <input id="rocnik_klub" placeholder="Ročník, klub">
      <input id="email" placeholder="Email rodiče">

      <button onclick="reserve()">Rezervovat</button>
      <button class="back-btn" onclick="renderDay()">Zpět</button>

    </div>
  `;
}

/* RESERVE */
async function reserve(){

  const hrac = document.getElementById("hrac")?.value?.trim();
  const rocnik_klub = document.getElementById("rocnik_klub")?.value?.trim();
  const email = document.getElementById("email")?.value?.trim();

  if(!hrac || !rocnik_klub || !email){
    alert("Vyplň všechny údaje");
    return;
  }

  const t = selectedTraining;

  if(!t){
    alert("Chyba tréninku");
    return;
  }

  const { error } = await supabaseClient
    .from("rezervace")
    .insert([{
      trening_id: t.id,
      hrac,
      rocnik_klub,
      email
    }]);

  if(error){
    console.log(error);
    alert("Chyba rezervace");
    return;
  }

  try{
    await fetch("/.netlify/functions/send-email", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ hrac, email, treningId: t.id })
    });
  }catch(e){}

  alert("Rezervace hotová 💪");

  await load();
}

/* FORMAT */
function formatDate(date){
  if(!date) return "";
  return new Date(date).toLocaleDateString("cs-CZ", {
    weekday:"long",
    day:"numeric",
    month:"numeric"
  });
}

load();

</script>

</body>
</html>
