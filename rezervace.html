<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Rezervace</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body { font-family: Arial; background:#f4f6f8; padding:20px; }
    .card { background:white; padding:15px; margin:10px 0; border-radius:8px; }
  </style>
</head>

<body>

<h1>Tréninky</h1>
<div id="list">Načítám...</div>

<script>
const supabaseClient = supabase.createClient(
  "https://kgmdyhiwkkviswluuwkg.supabase.co",
  "sb_publishable_kfn3T6iQ94DE9KLhH82jvw_zEJF-CqI"
);

async function load() {
  const { data, error } = await supabaseClient
    .from("treninky")
    .select("*");

  console.log(data, error);

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(t => {
    list.innerHTML += `
      <div class="card">
        <h2>${t.nazev}</h2>
        <p>${t.datum} ${t.cas_od} - ${t.cas_do}</p>
        <p>Kapacita: ${t.kapacita}</p>
      </div>
    `;
  });
}

load();
</script>

</body>
</html>
