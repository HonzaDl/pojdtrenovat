<script>

const supabaseClient = supabase.createClient(
  "https://kgmdyhiwkkviswluuwkg.supabase.co",

);

let allData = [];
let selectedDay = null;

// ---------------- LOAD ----------------
async function load(){

  const { data, error } = await supabaseClient
    .from("treninky")
    .select("*")
    .order("datum");

  if(error){
    console.log(error);
    return;
  }

  allData = data;
  renderCalendar();
}

// ---------------- CALENDAR ----------------
function renderCalendar(){

  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  let grouped = {};

  allData.forEach(t=>{
    if(!grouped[t.datum]) grouped[t.datum]=[];
    grouped[t.datum].push(t);
  });

  for(const date in grouped){

    const div = document.createElement("div");
    div.className = "calendar-day";

    div.innerHTML = `
      <b>${date}</b><br>
      ${grouped[date].length} tréninků
    `;

    div.onclick = () => {
      selectedDay = grouped[date];
      renderList();
    };

    cal.appendChild(div);
  }
}

// ---------------- LIST ----------------
function renderList(){

  const list = document.getElementById("list");
  list.innerHTML = "";

  let data = selectedDay || allData;

  data.forEach(t => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${t.nazev}</h3>
      <p>${t.datum} | ${t.cas_od} - ${t.cas_do}</p>
      <p>Místo: ${t.misto || "-"}</p>
      <p>Cena: ${t.cena || "-"} Kč</p>

      <input id="hrac-${t.id}" placeholder="Jméno hráče">
      <input id="vek-${t.id}" placeholder="Věk">
      <input id="email-${t.id}" placeholder="Email rodiče">

      <button onclick="reserve('${t.id}')">Rezervovat</button>
    `;

    list.appendChild(div);
  });
}
