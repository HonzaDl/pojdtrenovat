<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rezervace tréninků | pojdtrenovat.cz</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styl.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Roboto, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
    }

    .header {
      background: black;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
    }

    button {
      padding: 10px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      margin-top: 5px;
    }

    .full {
      color: red;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header class="header">
  <h1>Rezervace tréninků</h1>
  <nav class="nav">
    <a href="index.html">Úvod</a>
    <a href="rezervace.html">Rezervace</a>
  </nav>
</header>

<div class="container" id="list"></div>

<script>
const supabaseClient = supabase.createClient(
  "https://kgmdyhiwkkviswluuwkg.supabase.co",
  "sb_publishable_kfn3T6iQ94DE9KLhH82jvw_zEJF-CqI"
);

async function load() {
  console.log("Načítám tréninky...");

  const { data: treninky, error } = await supabaseClient
    .from("treninky")
    .select("*")
    .order("datum");

  console.log("DATA:", treninky);
  console.log("ERROR:", error);

  const container = document.getElementById("list");
  container.innerHTML = "";

  if (!treninky || treninky.length === 0) {
    container.innerHTML = "<p>Žádné tréninky nejsou k dispozici.</p>";
    return;
  }

  for (let t of treninky) {

    const { count } = await supabaseClient
      .from("rezervace")
      .select("*", { count: "exact", head: true })
      .eq("trening_id", t.id);

    const volno = t.kapacita - (count || 0);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h2>${t.nazev}</h2>
      <p>${t.datum} | ${t.cas_od} - ${t.cas_do}</p>

      <p>
        Kapacita: ${volno}/${t.kapacita}
        ${volno <= 0 ? '<span class="full"> - PLNO</span>' : ''}
      </p>

      ${volno > 0 ? `
        <input id="jmeno-${t.id}" placeholder="Jméno">
        <input id="email-${t.id}" placeholder="Email">
        <button onclick="rezervuj('${t.id}')">Rezervovat</button>
      ` : ''}
    `;

    container.appendChild(div);
  }
}

async function rezervuj(id) {
  const jmeno = document.getElementById("jmeno-" + id).value;
  const email = document.getElementById("email-" + id).value;

  if (!jmeno || !email) {
    alert("Vyplň jméno a email");
    return;
  }

  const { error } = await supabaseClient
    .from("rezervace")
    .insert([{ trening_id: id, jmeno, email }]);

  if (error) {
    alert("Chyba při rezervaci");
    console.log(error);
    return;
  }

  alert("Rezervace proběhla úspěšně 💪");
  load();
}
<script>
async function load() {
  console.log("LOAD START");

  const { data, error } = await supabaseClient
    .from("treninky")
    .select("*");

  console.log("DATA:", data);
  console.log("ERROR:", error);

  const container = document.getElementById("list");
  container.innerHTML = "";

  if (error) {
    container.innerHTML = "<p>CHYBA: " + error.message + "</p>";
    return;
  }

  if (!data || data.length === 0) {
    container.innerHTML = "<p>Žádné tréninky</p>";
    return;
  }

  data.forEach(t => {
    container.innerHTML += `
      <div class="card">
        <h2>${t.nazev || "Trénink"}</h2>
        <p>${t.datum || ""} ${t.cas_od || ""} - ${t.cas_do || ""}</p>
      </div>
    `;
  });
}

load();
</script>

</body>
</html>
