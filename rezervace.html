<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rezervace tréninků</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Roboto, sans-serif;
      background:#f4f6f8;
      margin:0;
      padding:20px;
    }

    h1 { margin-bottom:20px; }

    .card {
      background:white;
      padding:15px;
      margin:10px 0;
      border-radius:10px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
      cursor:pointer;
    }

    #detail .card {
      cursor: default;
    }

    input, button {
      width:100%;
      padding:8px;
      margin-top:5px;
    }

    button {
      background:black;
      color:white;
      border:none;
      border-radius:5px;
    }

    .full {
      color:red;
      font-weight:bold;
    }
  </style>
</head>

<body>

<h1>Kalendář tréninků</h1>

<div id="calendar">Načítám...</div>
<div id="detail"></div>

<script>
const supabaseClient = supabase.createClient(
  "https://kgmdyhiwkkviswluuwkg.supabase.co",
  "sb_publishable_kfn3T6iQ94DE9KLhH82jvw_zEJF-CqI"
);

// KALENDÁŘ
async function loadCalendar() {
  const { data } = await supabaseClient
    .from("treninky")
    .select("*")
    .order("datum");

  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  let grouped = {};

  data.forEach(t => {
    if (!grouped[t.datum]) grouped[t.datum] = [];
    grouped[t.datum].push(t);
  });

  for (const date in grouped) {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `<b>${date}</b> (${grouped[date].length} tréninků)`;

    div.onclick = () => showDay(grouped[date], date);

    cal.appendChild(div);
  }
}

// DETAIL DNE
async function showDay(treninky, date) {
  const detail = document.getElementById("detail");
  detail.innerHTML = `<h2>${date}</h2>`;

  for (let t of treninky) {

    const { count } = await supabaseClient
      .from("rezervace")
      .select("*", { count: "exact", head: true })
      .eq("trening_id", t.id);

    const obsazeno = count || 0;
    const volno = t.kapacita - obsazeno;

    detail.innerHTML += `
      <div class="card">
        <b>${t.nazev}</b><br>
        ${t.cas_od} - ${t.cas_do}<br>
        Kapacita: ${obsazeno}/${t.kapacita}

        ${volno > 0 ? `
          <input id="n-${t.id}" placeholder="Jméno">
          <input id="e-${t.id}" placeholder="Email">
          <button onclick="reserve('${t.id}')">Rezervovat</button>
        ` : `<p class="full">PLNO</p>`}
      </div>
    `;
  }
}

// REZERVACE
async function reserve(id) {
  const name = document.getElementById("n-" + id).value;
  const email = document.getElementById("e-" + id).value;

  if (!name || !email) return alert("Vyplň údaje");

  const { error } = await supabaseClient
    .from("rezervace")
    .insert([{ trening_id: id, jmeno: name, email }]);

  if (error) {
    console.log(error);
    return alert("Chyba rezervace");
  }

  alert("Rezervováno 💪");
  loadCalendar();
}

loadCalendar();
</script>

</body>
</html>
