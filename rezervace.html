<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rezervace | Pojdtrenovat.cz</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styl.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body { font-family: Arial; background:#f4f6f8; padding:20px; }
    .card { background:white; padding:15px; margin:10px 0; border-radius:8px; }
  </style>
</head>

<body>

<header class="header">
  <h1>pojdtrenovat.cz</h1>
  <nav class="nav">
    <a href="index.html">Úvod</a>
    <a href="treneri.html">Trenéři</a>
    <a href="rezervace.html">Rezervace</a>
  </nav>
</header>

<a href="javascript:history.back()">← Zpět</a>

<h1>Tréninky</h1>
<div id="list">Načítám...</div>

<script>
const supabaseClient = supabase.createClient(
  "https://kgmdyhiwkkviswluuwkg.supabase.co",
  "sb_publishable_kfn3T6iQ94DE9KLhH82jvw_zEJF-CqI"
);

async function load() {
  const container = document.getElementById("list");
  container.innerHTML = "Načítám...";

  const { data, error } = await supabaseClient
    .from("treninky")
    .select("*");

  if (error) {
    container.innerHTML = "Chyba načítání";
    return;
  }

  container.innerHTML = "";

  data.forEach(t => {
    container.innerHTML += `
      <div class="card">
        <h2>${t.nazev}</h2>
        <p>${t.datum} ${t.cas_od} - ${t.cas_do}</p>
        <p>Kapacita: ${t.kapacita}</p>

        <input id="name-${t.id}" placeholder="Jméno">
        <input id="email-${t.id}" placeholder="Email">
        <button onclick="reserve('${t.id}')">Rezervovat</button>
      </div>
    `;
  });
}

async function reserve(id) {
  const name = document.getElementById("name-" + id).value;
  const email = document.getElementById("email-" + id).value;

  if (!name || !email) {
    alert("Vyplň jméno a email");
    return;
  }

  const { error } = await supabaseClient
    .from("rezervace")
    .insert([{ trening_id: id, jmeno: name, email }]);

  if (error) {
    alert("Chyba rezervace");
    console.log(error);
    return;
  }

  alert("Rezervace hotová 💪");
  load();
}

load();
</script>

</body>
</html>
