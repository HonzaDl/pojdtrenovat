<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rezervace | pojdtrenovat.cz</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<link rel="stylesheet" href="styl.css">
</head>

<body>

<header class="header">
  <h1 class="site-title">pojdtrenovat.cz</h1>

  <nav class="nav">
    <a href="index.html">Úvod</a>
    <a href="treneri.html">Trenéři</a>
    <a href="rezervace.html">Rezervace</a>
  </nav>

  <div class="logos-right">
    <img src="images/logoo.jpg" class="new-logo">
    <img src="images/ssgihockey.jpg" class="nav-logo">
  </div>
</header>

<main class="container">
  <h2>Rezervace tréninků</h2>
  <div id="app">Načítám...</div>
</main>

<script>

const supabaseClient = supabase.createClient(
  "https://kgmdyhiwkkviswluuwkg.supabase.co",
  "sb_publishable_kfn3T6iQ94DE9KLhH82jvw_zEJF-CqI"
);

let trainings = [];
let days = [];
let selectedDay = 0;
let selectedTraining = null;
let counts = {};

/* ================= LOAD ================= */
async function load(){

  const { data: t } = await supabaseClient
    .from("treninky")
    .select("*");

  const { data: r } = await supabaseClient
    .from("rezervace")
    .select("trening_id");

  trainings = t || [];

  counts = {};
  (r || []).forEach(x=>{
    if(!x.trening_id) return;
    counts[x.trening_id] = (counts[x.trening_id] || 0) + 1;
  });

  days = [...new Set(trainings.map(x => x.datum).filter(Boolean))]
    .sort((a,b)=> new Date(a) - new Date(b));

  if(selectedDay >= days.length) selectedDay = 0;

  render();
}

/* ================= RENDER ================= */
function render(){

  const date = days[selectedDay] || "";
  const list = trainings.filter(t => t.datum === date);

  let html = `
    <div class="app-header">
      <button onclick="changeDay(-1)">←</button>
      <div>${format(date)}</div>
      <button onclick="changeDay(1)">→</button>
    </div>

    <div class="app-list">
  `;

  list.forEach(t=>{

    const count = counts[t.id] || 0;
    const cap = Number(t.kapacita || 0);
    const free = cap - count;

    let color = "green";
    if(free <= 0) color = "red";
    else if(free <= 2) color = "yellow";

    html += `
      <div class="app-card ${color}" onclick="openDetail('${t.id}')">
        <h3>${t.nazev}</h3>
        <p>${t.cas_od} - ${t.cas_do}</p>
        <p>${count}/${cap}</p>
      </div>
    `;
  });

  html += `</div>`;

  document.getElementById("app").innerHTML = html;
}

/* ================= CHANGE DAY ================= */
function changeDay(dir){
  selectedDay += dir;
  if(selectedDay < 0) selectedDay = 0;
  if(selectedDay >= days.length) selectedDay = days.length - 1;
  render();
}

/* ================= DETAIL ================= */
function openDetail(id){

  selectedTraining = trainings.find(x => x.id === id);
  const t = selectedTraining;

  document.getElementById("app").innerHTML = `
    <div class="bottom-sheet">

      <h2>${t.nazev}</h2>

      <p>📅 ${t.datum}</p>
      <p>⏰ ${t.cas_od} - ${t.cas_do}</p>
      <p>📍 ${t.misto || "-"}</p>
      <p>💰 ${t.cena ? t.cena + " Kč" : "Zdarma"}</p>

      <input id="hrac" placeholder="Jméno hráče">
      <input id="rocnik_klub" placeholder="Ročník / klub">
      <input id="email" placeholder="Email rodiče">

      <button onclick="reserve()">Rezervovat</button>
      <button onclick="render()">Zpět</button>

    </div>
  `;
}

/* ================= RESERVE ================= */
async function reserve(){

  const hrac = document.getElementById("hrac").value.trim();
  const rocnik_klub = document.getElementById("rocnik_klub").value.trim();
  const email = document.getElementById("email").value.trim();

  if(!hrac || !rocnik_klub || !email){
    alert("Vyplň vše");
    return;
  }

  const t = selectedTraining;

  const { error } = await supabaseClient
    .from("rezervace")
    .insert([{
      trening_id: t.id,
      hrac,
      rocnik_klub,
      email
    }]);

  if(error){
    alert("Chyba rezervace");
    return;
  }

  await fetch("/.netlify/functions/send-email", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ hrac, email, treningId: t.id })
  });

  alert("Hotovo");

  load();
}

/* ================= FORMAT ================= */
function format(d){
  if(!d) return "";
  return new Date(d).toLocaleDateString("cs-CZ", {
    weekday:"long",
    day:"numeric",
    month:"numeric"
  });
}

load();
</script>

</body>
</html>
