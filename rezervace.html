<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rezervace tréninků | pojdtrenovat.cz</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styl.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Roboto, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
    }

    .header {
      background: black;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
    }

    button {
      padding: 10px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      margin-top: 5px;
    }

    .full {
      color: red;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header class="header">
  <h1>Rezervace tréninků</h1>
  <nav class="nav">
    <a href="index.html">Úvod</a>
    <a href="rezervace.html">Rezervace</a>
  </nav>
</header>

<div class="container" id="list"></div>

<script>
const supabaseClient = supabase.createClient(
  "https://kgmdyhiwkkviswluuwkg.supabase.co",
  "sb_publishable_kfn3T6iQ94DE9KLhH82jvw_zEJF-CqI"
);

async function load() {
  console.log("Načítám tréninky...");

  const { data: treninky, error } = await supabaseClient
    .from("treninky")

    .order("datum");

  console.log("DATA:", treninky);
  console.log("ERROR:", error);

  const container = document.getElementById("list");

 <script>
async function load() {
  console.log("LOAD START");

  const { data, error } = await supabaseClient
    .from("treninky")
    .select("*");

  console.log("DATA:", data);
  console.log("ERROR:", error);

  const container = document.getElementById("list");
  container.innerHTML = "";

  if (error) {
    container.innerHTML = "<p>CHYBA: " + error.message + "</p>";
    return;
  }

  if (!data || data.length === 0) {
    container.innerHTML = "<p>Žádné tréninky</p>";
    return;
  }

  data.forEach(t => {
    container.innerHTML += `
      <div class="card">
        <h2>${t.nazev || "Trénink"}</h2>
        <p>${t.datum || ""} ${t.cas_od || ""} - ${t.cas_do || ""}</p>
      </div>
    `;
  });
}

load();
</script>

load();
</script>

</body>
</html>
