<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rezervace | pojdtrenovat.cz</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<link rel="stylesheet" href="styl.css">
</head>

<body>

<header class="header">
  <h1 class="site-title">pojdtrenovat.cz</h1>

  <nav class="nav">
    <a href="index.html">Úvod</a>
    <a href="treneri.html">Trenéři</a>
    <a href="rezervace.html">Rezervace</a>
  </nav>

  <div class="logos-right">
    <img src="images/logoo.jpg" class="new-logo">
    <img src="images/ssgihockey.jpg" class="nav-logo">
  </div>
</header>

<main>
  <h2>Rezervace tréninků</h2>
  <div id="app">Načítám...</div>
</main>

<script>
const supabaseClient = supabase.createClient(
  "https://kgmdyhiwkkviswluuwkg.supabase.co",
  "sb_publishable_kfn3T6iQ94DE9KLhH82jvw_zEJF-CqI"
);

let all = [];
let days = [];
let selectedDay = 0;
let selectedTraining = null;
let counts = {};

/* LOAD */
async function load(){

  const { data: t } = await supabaseClient
    .from("treninky")
    .select("*");

  const { data: r } = await supabaseClient
    .from("rezervace")
    .select("trening_id");

  all = t || [];

  counts = {};
  (r || []).forEach(x=>{
    if(!x.trening_id) return;
    counts[x.trening_id] = (counts[x.trening_id] || 0) + 1;
  });

  days = [...new Set(all.map(x => x.datum).filter(Boolean))]
    .sort((a,b)=> new Date(a) - new Date(b));

  render();
}

/* DAY */
function render(){

  const date = days[selectedDay] || "";
  const list = all.filter(t => t.datum === date);

  let html = `
    <div class="app-header">
      <button onclick="changeDay(-1)">←</button>
      <div>${date}</div>
      <button onclick="changeDay(1)">→</button>
    </div>

    <div class="app-list">
  `;

  list.forEach(t=>{

    const count = counts[t.id] || 0;
    const cap = Number(t.kapacita || 0);

    html += `
      <div class="app-card" onclick="openTraining('${t.id}')">
        <h3>${t.nazev}</h3>
        <p>${t.cas_od} - ${t.cas_do}</p>
        <p>${count}/${cap}</p>
      </div>
    `;
  });

  html += "</div>";

  document.getElementById("app").innerHTML = html;
}

/* OPEN */
function openTraining(id){

  selectedTraining = all.find(x => x.id === id);

  const t = selectedTraining;

  document.getElementById("app").innerHTML = `
    <div class="bottom-sheet">

      <h2>${t.nazev}</h2>
      <p>${t.datum}</p>
      <p>${t.cas_od} - ${t.cas_do}</p>
      <p>${t.misto || ""}</p>

      <input id="hrac" placeholder="Jméno hráče">
      <input id="rocnik_klub" placeholder="Ročník / klub">
      <input id="email" placeholder="Email rodiče">

      <button onclick="reserve()">Rezervovat</button>
      <button onclick="load()">Zpět</button>

    </div>
  `;
}

/* RESERVE */
async function reserve(){

  const hrac = document.getElementById("hrac").value;
  const rocnik_klub = document.getElementById("rocnik_klub").value;
  const email = document.getElementById("email").value;

  await supabaseClient
    .from("rezervace")
    .insert([{ trening_id: selectedTraining.id, hrac, rocnik_klub, email }]);

  await fetch("/.netlify/functions/send-email", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ hrac, email, treningId: selectedTraining.id })
  });

  alert("Hotovo");

  load();
}

function changeDay(dir){
  selectedDay += dir;
  if(selectedDay < 0) selectedDay = 0;
  if(selectedDay >= days.length) selectedDay = days.length - 1;
  render();
}

load();
</script>

</body>
</html>
