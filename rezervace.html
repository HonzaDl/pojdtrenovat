<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rezervace | pojdtrenovat.cz</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<link rel="stylesheet" href="styl.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
  <h1 class="site-title">pojdtrenovat.cz</h1>

  <nav class="nav">
    <a href="index.html">Úvod</a>
    <a href="treneri.html">Trenéři</a>
    <a href="rezervace.html">Rezervace</a>
  </nav>

  <div class="logos-right">
    <img src="images/logoo.jpg" class="new-logo">
    <img src="images/ssgihockey.jpg" class="nav-logo">
  </div>
</header>

<main class="container">

  <h2>Kalendář tréninků</h2>

  <!-- KALENDÁŘ DNŮ -->
  <div id="calendar"></div>

  <h2>Tréninky</h2>
  <div id="trainings">Vyber den</div>

  <h2>Detail</h2>
  <div id="detail"></div>

</main>

<script>

const supabaseClient = supabase.createClient(
  "https://kgmdyhiwkkviswluuwkg.supabase.co",
  "sb_publishable_kfn3T6iQ94DE9KLhH82jvw_zEJF-CqI"
);

let all = [];
let selectedDate = null;

/* ================= LOAD ================= */
async function load(){

  const { data } = await supabaseClient
    .from("treninky")
    .select("*");

  all = data || [];

  renderCalendar();
}

/* ================= CALENDAR ================= */
function renderCalendar(){

  const uniqueDays = [...new Set(all.map(t => t.datum).filter(Boolean))];
  uniqueDays.sort((a,b)=> new Date(a) - new Date(b));

  const cal = document.getElementById("calendar");

  cal.innerHTML = "";

  uniqueDays.forEach(d => {

    const count = all.filter(t => t.datum === d).length;

    const div = document.createElement("div");
    div.className = "app-card";
    div.innerHTML = `
      <b>${formatDate(d)}</b><br>
      ${count} tréninků
    `;

    div.onclick = () => showTrainings(d);

    cal.appendChild(div);
  });
}

/* ================= TRAININGS ================= */
function showTrainings(date){

  selectedDate = date;

  const list = all.filter(t => t.datum === date);

  const box = document.getElementById("trainings");

  box.innerHTML = "";

  list.forEach(t => {

    const div = document.createElement("div");
    div.className = "app-card";
    div.innerHTML = `
      <b>${t.nazev}</b><br>
      ${t.cas_od} - ${t.cas_do}<br>
      Kapacita: ${t.kapacita || 0}
    `;

    div.onclick = () => openDetail(t);

    box.appendChild(div);
  });

  document.getElementById("detail").innerHTML = "";
}

/* ================= DETAIL + RESERVACE ================= */
function openDetail(t){

  document.getElementById("detail").innerHTML = `
    <div class="bottom-sheet">

      <h3>${t.nazev}</h3>

      <p>📅 ${t.datum}</p>
      <p>⏰ ${t.cas_od} - ${t.cas_do}</p>
      <p>📍 ${t.misto || "-"}</p>
      <p>💰 ${t.cena ? t.cena + " Kč" : "Zdarma"}</p>

      <input id="hrac" placeholder="Jméno hráče">
      <input id="rocnik_klub" placeholder="Ročník / klub">
      <input id="email" placeholder="Email rodiče">

      <button onclick="reserve('${t.id}')">Rezervovat</button>

    </div>
  `;
}

/* ================= RESERVATION ================= */
async function reserve(trainingId){

  const hrac = document.getElementById("hrac").value.trim();
  const rocnik_klub = document.getElementById("rocnik_klub").value.trim();
  const email = document.getElementById("email").value.trim();

  if(!hrac || !rocnik_klub || !email){
    alert("Vyplň všechny údaje");
    return;
  }

  const { error } = await supabaseClient
    .from("rezervace")
    .insert([{
      trening_id: trainingId,
      hrac,
      rocnik_klub,
      email
    }]);

  if(error){
    alert("Chyba rezervace");
    return;
  }

  try{
    await fetch("/.netlify/functions/send-email", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ hrac, email, treningId: trainingId })
    });
  }catch(e){}

  alert("Rezervace hotová 💪");

  load();
}

/* ================= FORMAT ================= */
function formatDate(date){
  if(!date) return "";
  return new Date(date).toLocaleDateString("cs-CZ", {
    weekday:"long",
    day:"numeric",
    month:"numeric"
  });
}

load();

</script>

</body>
</html>
