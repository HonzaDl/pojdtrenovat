<script>

const supabaseClient = supabase.createClient(
  "https://kgmdyhiwkkviswluuwkg.supabase.co",
  "sb_publishable_kfn3T6iQ94DE9KLhH82jvw_zEJF-CqI"
);

let current = null;
let all = [];

/* LOAD */
async function load(){
  const { data } = await supabaseClient
    .from("treninky")
    .select("*")
    .order("datum");

  all = data || [];
  renderCalendar();
}

/* SAVE (INSERT / UPDATE přes Netlify) */
async function save(){

  let obj = {};

  document.querySelectorAll("#form input").forEach(i=>{
    obj[i.id.replace("f-","")] = i.value.trim();
  });

  obj.kapacita = Number(obj.kapacita || 0);
  obj.cena = Number(obj.cena || 0);

  // UPDATE
  if(current && current.id){

    obj.id = current.id;

    const res = await fetch("/.netlify/functions/update-training", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(obj)
    });

    const data = await res.json();

    if(data.error){
      return alert("❌ Update selhal: " + data.error);
    }

    alert("✔ Upraveno");

  } else {

    // INSERT normálně
    const { error } = await supabaseClient
      .from("treninky")
      .insert([obj]);

    if(error){
      return alert("❌ Chyba: " + error.message);
    }

    alert("✔ Vytvořeno");
  }

  current = null;
  load();
  document.getElementById("form").innerHTML="";
}

/* DELETE přes Netlify */
async function deleteTraining(){

  if(!current) return;

  if(!confirm("Smazat trénink?")) return;

  const res = await fetch("/.netlify/functions/delete-training", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ id: current.id })
  });

  const data = await res.json();

  if(data.error){
    return alert("❌ Mazání selhalo: " + data.error);
  }

  alert("✔ Smazáno");

  current=null;
  load();
  document.getElementById("form").innerHTML="";
  document.getElementById("players").innerHTML="";
}

/* FORM */
function buildForm(data){

  const form=document.getElementById("form");
  form.innerHTML="";

  for(const k in data){

    if(k==="id"||k==="created_at") continue;

    const input=document.createElement("input");
    input.id="f-"+k;
    input.value=data[k] || "";
    input.placeholder=k;

    form.appendChild(input);
  }

  if(current){
    const del=document.createElement("button");
    del.innerText="🗑 Smazat trénink";
    del.onclick=deleteTraining;
    form.appendChild(del);
  }
}

</script>
