<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | pojdtrenovat.cz</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  font-family:Roboto;
  margin:0;
  background:#f4f6f8;
}

/* LOGIN */
#login{
  max-width:300px;
  margin:100px auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
  text-align:center;
}

input,button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
}

button{
  background:black;
  color:white;
  border:none;
}

/* APP */
#app{display:none;padding:15px}

/* CALENDAR */
#calendar{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:10px;
}

.day{
  background:white;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  border-left:4px solid #e00000;
}

/* TRAINING */
.training{
  background:white;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

/* FORM */
#form{
  background:white;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Admin</h2>
  <input id="user" placeholder="Uživatel">
  <input id="pass" placeholder="Heslo" type="password">
  <button onclick="login()">Přihlásit</button>
</div>

<!-- APP -->
<div id="app">
  <h1>Admin kalendář</h1>

  <div id="calendar"></div>
  <div id="trainings"></div>

  <h2>Formulář</h2>
  <div id="form"></div>
  <button onclick="save()">Uložit</button>
</div>

<script>

const supabaseClient = supabase.createClient(
  "https://kgmdyhiwkkviswluuwkg.supabase.co",
  "sb_publishable_kfn3T6iQ94DE9KLhH82jvw_zEJF-CqI"
);

let currentId = null;

// LOGIN (jednoduchý)
function login(){
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if(u==="admin" && p==="1234"){ // 🔥 změň si!
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    loadCalendar();
  } else {
    alert("Špatné údaje");
  }
}

// LOAD CALENDAR
async function loadCalendar(){

  const {data} = await supabaseClient
    .from("treninky")
    .select("*")
    .order("datum");

  let grouped = {};

  data.forEach(t=>{
    if(!grouped[t.datum]) grouped[t.datum]=[];
    grouped[t.datum].push(t);
  });

  const cal = document.getElementById("calendar");
  cal.innerHTML="";

  for(const date in grouped){

    const div=document.createElement("div");
    div.className="day";
    div.innerHTML=`<b>${date}</b><br>${grouped[date].length} tréninků`;

    div.onclick=()=>showTrainings(grouped[date]);

    cal.appendChild(div);
  }
}

// SHOW TRAININGS
function showTrainings(list){

  const cont=document.getElementById("trainings");
  cont.innerHTML="";

  list.forEach(t=>{

    const div=document.createElement("div");
    div.className="training";

    div.innerHTML=`
      <b>${t.nazev}</b><br>
      ${t.cas_od} - ${t.cas_do}
    `;

    div.onclick=()=>edit(t);

    cont.appendChild(div);
  });
}

// EDIT (AUTO FORM)
function edit(data){
  currentId = data.id;
  generateForm(data);
}

// AUTO FORM
function generateForm(data = {}){

  const form=document.getElementById("form");
  form.innerHTML="";

  for(const key in data){

    if(key==="id" || key==="created_at") continue;

    const label=document.createElement("label");
    label.innerText=key;

    const input=document.createElement("input");
    input.id="f-"+key;
    input.value=data[key] || "";

    form.appendChild(label);
    form.appendChild(input);
  }
}

// SAVE (INSERT / UPDATE)
async function save(){

  const inputs=document.querySelectorAll("#form input");
  let obj={};

  inputs.forEach(i=>{
    const key=i.id.replace("f-","");
    obj[key]=i.value;
  });

  let result;

  if(currentId){
    result = await supabaseClient
      .from("treninky")
      .update(obj)
      .eq("id", currentId);
  } else {
    result = await supabaseClient
      .from("treninky")
      .insert([obj]);
  }

  if(result.error){
    console.log(result.error);
    alert("Chyba");
    return;
  }

  alert("Uloženo 💪");
  loadCalendar();
}

// INIT FORM (prázdný)
generateForm({
  nazev:"",
  datum:"",
  cas_od:"",
  cas_do:"",
  kapacita:"",
  misto:"",
  cena:""
});

</script>

</body>
</html>
