<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | pojdtrenovat.cz</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{font-family:Roboto;margin:0;background:#f4f6f8}

#login{
  max-width:320px;
  margin:100px auto;
  background:#fff;
  padding:20px;
  border-radius:12px;
}

input,button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
}

button{
  background:#000;
  color:#fff;
  border:none;
  cursor:pointer;
}

#app{display:none;padding:15px}

#calendar{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:10px;
}

.day{
  background:#fff;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  border-left:4px solid #e00000;
}

.training{
  background:#fff;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border-left:4px solid #000;
  cursor:pointer;
}

#form{
  background:#fff;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
}

.delete-btn{
  background:#e00000;
}

.player{
  background:#fff;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border-left:4px solid #e00000;
}
</style>
</head>

<body>

<div id="login">
  <h2>Admin</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Heslo">
  <button onclick="login()">Přihlásit</button>
</div>

<div id="app">

  <button onclick="logout()">Odhlásit</button>
  <button onclick="newTraining()">➕ Nový trénink</button>

  <h2>Kalendář</h2>
  <div id="calendar"></div>

  <h2>Tréninky</h2>
  <div id="trainings"></div>

  <h2>Editace</h2>
  <div id="form"></div>

  <button onclick="save()">💾 Uložit</button>

  <h2>Hráči</h2>
  <div id="players"></div>

</div>

<script>

const supabaseClient = supabase.createClient(
  "https://kgmdyhiwkkviswluuwkg.supabase.co",
  "sb_publishable_kfn3T6iQ94DE9KLhH82jvw_zEJF-CqI"
);

let current = null;
let all = [];

/* LOGIN */
async function login(){
  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if(error) return alert("Špatné přihlášení");

  start();
}

function start(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  load();
}

async function logout(){
  await supabaseClient.auth.signOut();
  location.reload();
}

/* ================= LOAD (FIX) ================= */
async function load(){

  const { data, error } = await supabaseClient
    .from("treninky")
    .select("*")
    .order("datum", { ascending: true });

  if(error){
    console.log(error);
    return;
  }

  all = [...data]; // 💣 IMPORTANT: force new reference
  renderCalendar();
}

/* ================= CALENDAR ================= */
function renderCalendar(){

  const cal=document.getElementById("calendar");
  cal.innerHTML="";

  let grouped={};

  all.forEach(t=>{
    if(!grouped[t.datum]) grouped[t.datum]=[];
    grouped[t.datum].push(t);
  });

  for(const d in grouped){

    const div=document.createElement("div");
    div.className="day";

    div.innerHTML=`<b>${d}</b><br>${grouped[d].length} tréninků`;

    div.onclick=()=>renderTrainings(grouped[d]);

    cal.appendChild(div);
  }
}

/* ================= TRAININGS ================= */
function renderTrainings(list){

  const box=document.getElementById("trainings");
  box.innerHTML="";

  list.forEach(t=>{

    const div=document.createElement("div");
    div.className="training";

    div.innerHTML=`
      <b>${t.nazev}</b><br>
      ${t.cas_od} - ${t.cas_do}
    `;

    div.onclick=()=>open(t);

    box.appendChild(div);
  });
}

/* ================= OPEN ================= */
function open(t){
  current = t;
  buildForm(t);
  loadPlayers(t.id);
}

/* ================= NEW ================= */
function newTraining(){
  current = null;

  buildForm({
    nazev:"",
    datum:"",
    cas_od:"",
    cas_do:"",
    kapacita:"",
    misto:"",
    cena:"",
    popis:""
  });

  document.getElementById("players").innerHTML="";
}

/* ================= FORM ================= */
function buildForm(data){

  const form=document.getElementById("form");
  form.innerHTML="";

  for(const k in data){
    if(k==="id"||k==="created_at") continue;

    const input=document.createElement("input");
    input.id="f-"+k;
    input.value=data[k] || "";
    input.placeholder=k;

    form.appendChild(input);
  }

  if(current){
    const del=document.createElement("button");
    del.className="delete-btn";
    del.innerText="🗑 Smazat";
    del.onclick=deleteTraining;
    form.appendChild(del);
  }
}

/* ================= SAVE (FIXED FLOW) ================= */
async function save(){

  let obj = {};

  document.querySelectorAll("#form input").forEach(i=>{
    obj[i.id.replace("f-","")] = i.value.trim();
  });

  obj.kapacita = Number(obj.kapacita || 0);
  obj.cena = Number(obj.cena || 0);

  if(current && current.id){

    obj.id = current.id;

    const res = await fetch("/.netlify/functions/update-training", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(obj)
    });

    const data = await res.json();

    if(data.error){
      return alert("❌ Update selhal");
    }

  } else {

    const { error } = await supabaseClient
      .from("treninky")
      .insert([obj]);

    if(error){
      return alert("❌ Chyba");
    }
  }

  // 💣 HARD REFRESH STATE
  current = null;
  all = [];

  await load();

  document.getElementById("form").innerHTML="";
  document.getElementById("trainings").innerHTML="";
  document.getElementById("players").innerHTML="";
}

/* ================= DELETE ================= */
async function deleteTraining(){

  if(!current) return;
  if(!confirm("Smazat trénink?")) return;

  const res = await fetch("/.netlify/functions/delete-training", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ id: current.id })
  });

  const data = await res.json();

  if(data.error){
    return alert("❌ Mazání selhalo");
  }

  current=null;
  all=[];

  await load();

  document.getElementById("form").innerHTML="";
  document.getElementById("players").innerHTML="";
}

/* ================= PLAYERS ================= */
async function loadPlayers(id){

  const { data } = await supabaseClient
    .from("rezervace")
    .select("*")
    .eq("trening_id", id);

  const box=document.getElementById("players");
  box.innerHTML="";

  if(!data || !data.length){
    box.innerHTML="<p>Žádní hráči</p>";
    return;
  }

  data.forEach(r=>{

    const div=document.createElement("div");
    div.className="player";

    div.innerHTML=`
      <b>${r.hrac}</b> (${r.vek})<br>
      ${r.email}<br>
      <button onclick="deletePlayer('${r.id}')">❌ Smazat</button>
    `;

    box.appendChild(div);
  });
}

async function deletePlayer(id){

  if(!confirm("Smazat hráče?")) return;

  await supabaseClient
    .from("rezervace")
    .delete()
    .eq("id", id);

  loadPlayers(current.id);
}

start();

</script>

</body>
</html>
