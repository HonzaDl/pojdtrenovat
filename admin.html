<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Admin panel</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
      padding:20px;
      background:#f4f6f8;
    }

    input, button {
      width:100%;
      padding:10px;
      margin:5px 0;
    }

    button {
      background:black;
      color:white;
      border:none;
    }

    .box {
      background:white;
      padding:15px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<h1>Admin – přidání tréninku</h1>

<div class="box">
  <input id="nazev" placeholder="Název">
  <input id="datum" type="date">
  <input id="od" type="time">
  <input id="do" type="time">
  <input id="kapacita" type="number" placeholder="Kapacita">

  <button onclick="add()">Přidat trénink</button>
</div>

<script>
const supabaseClient = supabase.createClient(
  "https://kgmdyhiwkkviswluuwkg.supabase.co",
  "sb_publishable_kfn3T6iQ94DE9KLhH82jvw_zEJF-CqI"
);

async function add() {
  const nazev = document.getElementById("nazev").value;
  const datum = document.getElementById("datum").value;
  const od = document.getElementById("od").value;
  const doo = document.getElementById("do").value;
  const kapacita = document.getElementById("kapacita").value;

  const { error } = await supabaseClient
    .from("treninky")
    .insert([{
      nazev,
      datum,
      cas_od: od,
      cas_do: doo,
      kapacita
    }]);

  if (error) {
    console.log(error);
    return alert("Chyba");
  }

  alert("Přidáno 💪");
}
</script>

</body>
</html>
</html>
