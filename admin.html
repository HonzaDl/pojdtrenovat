<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Admin panel</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
      background:#f4f6f8;
      padding:20px;
    }

    .box {
      background:white;
      padding:15px;
      border-radius:10px;
      max-width:400px;
    }

    input, button {
      width:100%;
      padding:10px;
      margin:5px 0;
    }

    button {
      background:black;
      color:white;
      border:none;
      cursor:pointer;
    }

    .hidden { display:none; }

    .card {
      background:white;
      padding:10px;
      margin:10px 0;
      border-radius:10px;
    }
  </style>
</head>

<body>

<h1>Admin panel</h1>

<!-- LOGIN -->
<div id="loginBox" class="box">
  <h3>Přihlášení</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Heslo">
  <button onclick="login()">Přihlásit</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <h3>Přidat trénink</h3>

  <div class="box">
    <input id="nazev" placeholder="Název">
    <input id="datum" type="date">
    <input id="od" type="time">
    <input id="do" type="time">
    <input id="kapacita" type="number">
    <button onclick="add()">Přidat</button>
  </div>

  <h3>Odhlášení</h3>
  <button onclick="logout()">Logout</button>

</div>

<script>
const supabaseClient = supabase.createClient(
  "https://kgmdyhiwkkviswluuwkg.supabase.co",
  "sb_publishable_kfn3T6iQ94DE9KLhH82jvw_zEJF-CqI"
);

// LOGIN
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert("Chyba loginu");
    return;
  }

  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
}

// LOGOUT
async function logout() {
  await supabaseClient.auth.signOut();
  location.reload();
}

// ADD TRAINING
async function add() {
  const nazev = document.getElementById("nazev").value;
  const datum = document.getElementById("datum").value;
  const od = document.getElementById("od").value;
  const doo = document.getElementById("do").value;
  const kapacita = document.getElementById("kapacita").value;

  const { error } = await supabaseClient
    .from("treninky")
    .insert([{
      nazev,
      datum,
      cas_od: od,
      cas_do: doo,
      kapacita
    }]);

  if (error) {
    alert("Chyba");
    console.log(error);
  } else {
    alert("Přidáno 💪");
  }
}
</script>

</body>
</html>
