<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{font-family:Arial;margin:0;background:#f4f6f8}
#login,#app{padding:20px}
#app{display:none}

input,button{
  width:100%;
  padding:10px;
  margin-top:8px;
}

button{cursor:pointer}
.card{background:#fff;padding:10px;margin-top:10px;border-radius:8px}
</style>
</head>

<body>

<div id="login">
  <h2>Login</h2>
  <input id="email" placeholder="email">
  <input id="password" type="password" placeholder="heslo">
  <button onclick="login()">Přihlásit</button>
</div>

<div id="app">

  <button onclick="logout()">Logout</button>

  <h3>Tréninky</h3>
  <div id="list"></div>

  <h3>Form</h3>
  <div id="form"></div>

  <button onclick="save()">Uložit</button>

</div>

<script>

const supabase = supabase.createClient(
  "https://kgmdyhiwkkviswluuwkg.supabase.co",
  "sb_publishable_kfn3T6iQ94DE9KLhH82jvw_zEJF-CqI"
);

let current = null;
let data = [];

/* LOGIN */
async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({
    email, password
  });

  if(error) return alert("Login fail");

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";

  load();
}

/* LOGOUT */
async function logout(){
  await supabase.auth.signOut();
  location.reload();
}

/* LOAD */
async function load(){

  const { data: t } = await supabase
    .from("treninky")
    .select("*")
    .order("datum");

  data = t || [];

  render();
}

/* RENDER */
function render(){

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(t=>{

    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <b>${t.nazev}</b><br>
      ${t.datum} ${t.cas_od}
      <button onclick="edit('${t.id}')">edit</button>
      <button onclick="del('${t.id}')">delete</button>
    `;

    list.appendChild(div);
  });
}

/* EDIT */
function edit(id){
  current = data.find(x=>x.id===id);

  document.getElementById("form").innerHTML = `
    <input id="nazev" value="${current.nazev}">
    <input id="datum" value="${current.datum}">
    <input id="cas_od" value="${current.cas_od}">
  `;
}

/* SAVE */
async function save(){

  if(!current) return;

  const update = {
    nazev: document.getElementById("nazev").value,
    datum: document.getElementById("datum").value,
    cas_od: document.getElementById("cas_od").value
  };

  const { error } = await supabase
    .from("treninky")
    .update(update)
    .eq("id", current.id);

  if(error){
    return alert("save error");
  }

  current = null;
  load();
}

/* DELETE */
async function del(id){

  const { error } = await supabase
    .from("treninky")
    .delete()
    .eq("id", id);

  if(error){
    return alert("delete error");
  }

  load();
}

load();

</script>

</body>
</html>
