<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | pojdtrenovat.cz</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{font-family:Arial;margin:0;background:#f4f6f8}

#login,#app{padding:20px}
#app{display:none}

input,button{
  width:100%;
  padding:10px;
  margin-top:8px;
}

button{
  cursor:pointer;
  background:#000;
  color:#fff;
  border:none;
}

.card{
  background:#fff;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Admin login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Heslo">
  <button onclick="login()">Přihlásit</button>
</div>

<!-- APP -->
<div id="app">
  <button onclick="logout()">Odhlásit</button>

  <h3>Tréninky</h3>
  <div id="list"></div>

  <h3>Form</h3>
  <div id="form"></div>

  <button onclick="save()">Uložit</button>
</div>

<script>

const supabaseClient = supabase.createClient(
  "https://kgmdyhiwkkviswluuwkg.supabase.co",
  "sb_publishable_kfn3T6iQ94DE9KLhH82jvw_zEJF-CqI"
);

let data = [];
let editId = null;

/* ================= LOGIN ================= */
async function login(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    return alert("❌ špatné přihlášení");
  }

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";

  load();
}

/* ================= LOGOUT ================= */
async function logout(){
  await supabaseClient.auth.signOut();
  location.reload();
}

/* ================= LOAD ================= */
async function load(){

  const { data: t } = await supabaseClient
    .from("treninky")
    .select("*")
    .order("datum", { ascending: true });

  data = t || [];
  render();
}

/* ================= RENDER ================= */
function render(){

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(t=>{

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${t.nazev}</b><br>
      ${t.datum} ${t.cas_od} - ${t.cas_do}
      <br><br>

      <button onclick="edit('${t.id}')">Edit</button>
      <button onclick="removeTraining('${t.id}')">Smazat</button>
    `;

    list.appendChild(div);
  });
}

/* ================= EDIT ================= */
function edit(id){

  const t = data.find(x => x.id === id);
  editId = id;

  document.getElementById("form").innerHTML = `
    <input id="nazev" value="${t.nazev}">
    <input id="datum" value="${t.datum}">
    <input id="cas_od" value="${t.cas_od}">
    <input id="cas_do" value="${t.cas_do}">
    <input id="kapacita" value="${t.kapacita}">
    <input id="misto" value="${t.misto || ""}">
    <input id="cena" value="${t.cena || 0}">
  `;
}

/* ================= SAVE ================= */
async function save(){

  const obj = {
    nazev: document.getElementById("nazev").value,
    datum: document.getElementById("datum").value,
    cas_od: document.getElementById("cas_od").value,
    cas_do: document.getElementById("cas_do").value,
    kapacita: Number(document.getElementById("kapacita").value),
    misto: document.getElementById("misto").value,
    cena: Number(document.getElementById("cena").value)
  };

  if(editId){

    const { error } = await supabaseClient
      .from("treninky")
      .update(obj)
      .eq("id", editId);

    if(error){
      return alert("❌ update selhal");
    }

  } else {

    const { error } = await supabaseClient
      .from("treninky")
      .insert([obj]);

    if(error){
      return alert("❌ insert selhal");
    }
  }

  editId = null;
  document.getElementById("form").innerHTML = "";

  load();
}

/* ================= DELETE (FIXED) ================= */
async function removeTraining(id){

  if(!confirm("Smazat trénink?")) return;

  const { error } = await supabaseClient
    .from("treninky")
    .delete()
    .eq("id", id);

  if(error){
    return alert("❌ mazání selhalo");
  }

  load();
}

load();

</script>

</body>
</html>
